# 验证（我定的方式；Kevin 只看产出）
# ════════════════════════════════════════════════════════════════
verification:
  provenance: "✓ 每层挂到具体 object/mechanism ID（见 layers[].from）；自报 vs 实测在 capsules[].Z_degree 已分清。"
  composability:
    - "逐字底座(mempalace) + 版本链(supermemory)：不冲突。mempalace 自己也有有损索引层(c4)，版本链作用在『判断/抽取的事实』上、指向逐字 drawer；两层互补——mempalace 缺演化、supermemory 缺可审计逐字底座。"
    - "typed action(agemem) + 规则起步(rohitg00)：接口兼容（noRL 即 typed 接口的规则版，规则→RL 同接口升级）。**但兼容≠可用**：noRL 控制策略均分低于 Mem0（见 L4 修正）；接口可复用、规则控制策略本身待实测，是本栈最弱缝。"
    - "MAB 四维(评测) 独立于实现，可直接叠加当回归尺。"
    - "a1（保真不抽取）vs a2（抽取可覆盖）：分层**只解决了存储层**（mempalace.c4 自证它已在逐字之上跑有损索引，故设计自洽）——**但未解决检索默认**（对抗审）：一旦 isLatest=false，agent 默认先读演化后的抽象，正是 a1 警告的。设计补丁：检索默认须同时呈现逐字 drawer 指针、不可只返回 latest 抽象。"
  adversarial_review:
    state: done   # 独立冷 agent 已审，4 个阻塞修复已应用；详见 mem-long-term-agent-memory.review.md
    verdict: "HOLDS WITH REQUIRED FIXES（修复已应用，待 Kevin PR 签字毕业出 draft）"
    findings:
      - "MA-1 抽取污染——PARTIALLY：逐字底座让坏 supersede 可逆（相对 supermemory.f1 黑箱是真改进），但『可审计 ≠ 决策正确』，风险被削弱非消除。已在 L3 why 修正。"
      - "MA-2 规则起步是否够用——BREAKS 乐观框架（最弱缝）：agemem noRL 33.43/45.59 反低于 Mem0 37.14；『立即可用』实为检索层(rohitg00)非控制策略；『80%来自RL』表述不精确。已在 L4/composability/honest_boundaries 修正。"
      - "MA-3 拼凑不可比局部最优——HOLDS：借机制非分数、R@k 全标自报、引 MAB 当唯一实测共同尺；残留=该栈尚未在 MAB 四维实跑，须保持『未证伪假设』框定。"
      - "G-1 修复：rohitg00 capsule 文档漂移 caveat 补挂 f1（已加）。"
      - "G-2 确认：四条 prop.* 均存在于 registry/propositions.yaml（memory-rule-vs-learned / verbatim-vs-extraction / retrieval-metrics-insufficient / parametric-vs-external-memory）。"
      - "novelty——FAIR：整合型非新机制，rohitg00 exam_q 已勾勒 hybrid controller 雏形；措辞已据此降级。"
  empirical_opportunity: "可在本站 BriefMem 小语料上跑 MAB 四维（尤其 SF）回归——属机会层，非阻塞；非 agent 类不强求。"
  boundaries_cannot_borrow:
    - "agemem 的 RL 训练回路（step-wise GRPO）：本站无可训练 model-client，先只上规则版 typed 接口。"
    - "supermemory 的 hosted 消解引擎：黑箱不可审计，必须替换成 typed action 显式记账。"
    - "MAB 的 FactConsolidation 合成数据集：构念效度疑问，借维度协议、别复刻。"
    - "所有 R@k 均自报、口径不一、未独立复现——别当已核实 SOTA。"

# ════════════════════════════════════════════════════════════════
# 人读层：Kevin 问"怎么搭长期记忆 agent"时给的好办法
# ════════════════════════════════════════════════════════════════
answer:
  headline: "别在『规则vs学习』『逐字vs抽取』里选边——搭成一个分层、可审计、规则起步可学习预留的栈，逐字底座保真 + 可审计演化层管事实更新 + typed 动作做控制接口 + 可降级混合检索 + 四维验收死盯『选择性遗忘』。"
  do_first:
    - "先把记忆控制决策（何时写/取/改/删）抽成一组 typed action（agemem 的接口）——这一步是为可审计和未来挂学习层铺路；但别假设『规则填一下就够好』（见边界），把它当可观测的接口骨架而非已验证的策略。"
    - "底层逐字留原始记录别摘要（mempalace），上面叠一个轻量版本链管『新事实覆盖旧、到点遗忘』，覆盖/遗忘走 typed action 显式记账可回溯（取 supermemory 的契约、去它的黑箱）；检索默认要同时给逐字指针，别只返回覆盖后的最新抽象。"
    - "检索用向量 floor + BM25，缺腿能降级（这层是真·立即可用，rohitg00 自报 R@5 95.2%）；先别上图腿（小语料上反而拖累）。"
    - "用 MemoryAgentBench 四维当回归测试，尤其盯『选择性遗忘』——这是全行业 ≤7% 的盲区，也是判断你的记忆是不是真在进化的关键。"
  later: "等你有可训练模型/算力，再把 typed action 接口上挂强化学习（agemem 路线）——接口不用重构。"
  honest_boundaries: >
    （对抗审后据实收紧）① 真·立即可用的只有检索层（rohitg00 自报 R@5 95.2%，单基准、属检索能力）；
    ② **L4 规则控制策略未证可用**——agemem 去掉 RL 的 noRL 均分 33.43/45.59，反低于现成 Mem0 37.14，纯规则版在它自己基准上输给开箱基线，是本栈最该先实测的弱缝（RL 贡献约 +8.5/8.7pp，是『超基线增量』的大头但占绝对分约 20%，别说成八成）；
    ③ 可审计让错误覆盖可回溯、逐字底座让它可逆，但**消解决策本身仍可能错**（LLM-judge 偏差），风险被削弱非消除；
    ④ R@k 各家自报、口径不一、没同台；本架构是整合型融合假设，尚未在 MAB 四维上实跑——是『未证伪的好办法骨架』，不是定论。
