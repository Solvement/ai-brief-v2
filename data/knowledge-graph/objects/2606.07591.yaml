schema: ros-v1
object_id: paper/2606.07591
slug: "2606.07591"
kind: paper
title: "ResearchClawBench: A Benchmark for End-to-End Autonomous Scientific Research"
source: "arxiv:2606.07591（本地 TeX source）+ github.com/InternScience/ResearchClawBench（MIT，本地 clone HEAD 27c7e34）+ HF datasets/InternScience/ResearchClawBench"
one_sentence_thesis: >
  主张「coding agent 能自主做科研」的宣称缺乏可检验的评测、且实测远未达标——
  方法是把 40 道源自真实已发表论文的任务（10 个自然科学学科）做成端到端评测：每题给问题/文献/原始数据、
  把目标论文 p* 对系统隐藏（hidden target），用专家拆解的加权可验证 rubric（含 technical keywords）逐项判分，
  钉 50 分=复现线（re-discovery）、>50=发现（discovery），并配极简 ReAct 壳 ResearchHarness 让 17 个裸 LLM 与 7 个自主科研 agent 同台——
  在单 judge GPT-5.1 下实测（全部自报）最强 agent Claude Code 仅 21.5、最强裸 LLM Claude-Opus-4.7 仅 20.7，
  且 280 次 agent 运行的失败集中于实验协议/证据/科学内核错配，而非工具执行。

human:
  headline: 用 40 篇真实已发表论文当"藏起来的标准答案"，专测 coding agent 能不能从原始数据出发自主做出一项端到端科研。
  plain_summary: >
    这篇 ResearchClawBench（RCBench）针对"coding agent 能自主做科研"的宣传，造了一套能检验它的评测：每题给问题、文献和原始数据，
    把对应那篇真实论文藏起来当金样，再用专家按金样拆出的加权检查单（每项带要核对的关键词）给 agent 的最终报告逐项打分，
    50 分钉为"复现原论文"线、超过 50 才算有新发现。实测下来最强 agent（Claude Code）和最强裸模型都只有 20 分出头（作者自报），
    而且失败几乎都集中在"实验协议、证据、科学内核对不对"，不是工具跑不动。想给一个产出开放式报告/文本的系统设计评测的人，会想起这套打分法。
  use_type: directly_usable
  use_type_reason: 它给的两套可直接照搬的协议（藏金样让系统从原料重做 + 把开放式产出拆成带权重带关键词的逐项 rubric 打分），正是"想给自己系统设计评测"的人能直接拿来用的。
  how_to_use: >
    评一个产出开放式报告/文本、没法用精确匹配的系统时：先拿一份人类已经做好的金样，把它藏起来、只发原料让系统重做；
    再把金样拆成 5 到 7 个带权重的可核对子项，每项写清判据和要核对的关键词，让判官（大模型）逐项打分而不是打整体印象分，金样钉在刻度中点、上方留出超越空间。判分时明令"看实质不看排版"。
  can_borrow:
    - 把标准答案藏起来、只发原料让系统从头重做，是"它是真做出来了还是在背答案套模板"的可打分版白板测试。
    - 开放式产出别让判官打整体印象分——拆成带权重、带核对关键词的子项逐项打，方差更小、更能区分好坏。
    - 判分把客观项（定量结果）和主观项（机制论证）分开用不同分档表，并戒令"看实质不看文风"。
    - 横向比多个底模时，给所有模型同一个最小工具壳，把"模型能力"和"脚手架红利"分开测。
  cannot_borrow:
    - 别把"最强才 21.5 分"读成"AI 完全不能做科研"——这是只评终产物、单一判官、特定 40 题、特定版本的口径。
    - 科研域的具体 rubric 内容不能照抄，得按自己的领域重写子项。
    - 只评最终报告、不评过程——过程走对大半最后崩掉的，跟全程敷衍的可能拿到相近分，别拿它当过程诊断或训练奖励。
  maturity: 全部分数为作者自报、由单一判官按 rubric 打出、无人工复评比例报告，且按月迭代的模型版本会让绝对分数和排名很快过期。仓库为 MIT 开源（任务/判分脚本可得），门槛低、不需自有可训练模型；但只覆盖干实验室（dry-lab）任务。

# ── 正典挂接（R4）。problem 挂 eval.agent-capability（registry 描述「任务构造、隐藏参照、确定性打分」正中本篇）。
