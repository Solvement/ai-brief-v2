discovery_trace:
  hypothesis: "把标准 SVD-based 初始化从 SFT 迁移到 RL，应该能给低秩 LoRA 更好的几何起点。"
  failed_attempts: >
    论文中的 OLoRA 尝试显示这条路会在 RL 中过猛：在 DeepSeek-R1-Distill-Qwen-1.5B + DAPO 上约 step 100 collapse，reward 掉到 -1.0、KL 爆到 ~8。作者因此走向 OLoRA-tail：仍用 pretrained weight 的 minor singular vectors 初始化 B0 = U_-r, A0 = V_-r^T，但去掉 MiLoRA 的 singular-value scaling，让初始化有几何方向但不放大扰动；随后在 500 steps 内稳定，并在相同 DAPO-Math-17k、constant LR 1×10^-5、effective batch size 32、r=16、α=32 设置下得到 58.3% vs LoRA 56.3%。
  source_span: "paper.mdx 实验 / 证据 > 5. OLoRA-tail：低秩 RL 初始化要“有几何，但别太猛”——「标准 SVD-based 初始化从 SFT 搬到 RL 会出问题……OLoRA 在 DeepSeek-R1-Distill-Qwen-1.5B + DAPO 上约 step 100 collapse……OLoRA-tail 在 500 steps 内稳定」"

