# Mind Palace facet — 内化层（AI-only）。GOLD 示例：sub-agent 蒸馏其余节点照此格式。
# spine：用 X 方法解决 Y 问题，展现 Z 结果 + 创新/缺点。不编造，未知标「数据不足」，自报数字标「自报/受控」。
node_id: content/agemem
slug: agemem
kind: paper            # paper | project
title: "AgeMem — 记忆即可学习的策略动作"
source: "arxiv:2601.01885v2 + repo github.com/y1y5/AgeMem"

facets:
  problem_solved: >    # Y：解决哪类问题（一句，犀利）
    记忆生命周期（写入/检索/更新/删除/压缩/过滤）缺乏端到端监督——固定规则的记忆管理是死的，跟不上任务变化。

  method: >            # X：用什么方法（大白话+例子，不堆术语）
    把六个记忆操作（长期记忆 Add/Update/Delete + 短期上下文 Retrieve/Summary/Filter）变成 agent 能像调工具一样随时调用的「一等策略动作」，
    再用三阶段课程（先学记、再学在干扰下管上下文、最后学用记忆答题）+ step-wise GRPO（把"最后答对"的奖励回传给前面每一步）
    强化学习教它「什么时候按哪个按钮」。核心：记忆不是旁边的管家，是大脑的一部分，边想边记。

  result: >            # Z：在自己实验展现了什么（proven_case + 真实数字，标自报/受控）
    [自报·受控环境] 两个 backbone、五基准均分最高：Qwen2.5-7B 41.96%（vs Mem0 37.14%）、Qwen3-4B 54.31%（vs 最强基线 45.74%）；
    消融证承重的是 RL 训练不是接口（去 RL 掉 8.53/8.72pp）；面向记忆的奖励 > 只看答案（记忆质量 MQ 0.533 vs 0.479，Table 4）。

  innovation: >        # 创新：与同赛道比新在哪
    把记忆操作从「外挂的固定管道」变成「可学习的策略动作」——发明的不是新数据库，是新控制方式。
    step-wise GRPO 用终局优势广播解决「早期存/删决定拿不到监督信号」的延迟信用分配难题。

  weakness: >          # 缺点/适用边界/坑（该不该用它靠这条）
    训练轨迹全来自单一数据集 HotpotQA，跨域泛化未证（作者自承）；记忆质量由 LLM-judge 打分、非人工，主结果与消融共享同一评判偏差；
    信用分配粗糙（一个终局优势广播给所有步，会奖到无关动作）；复现重——需 Qwen + DashScope 付费 key + Trinity-RFT 框架，非 turnkey。

  transfer: >          # 能迁移到什么 / 用于研究·自进化
    最值得借的不是 RL 代码，是「可训练记忆接口」设计：把 AI-Brief/自进化 agent 的记忆写入/更新/删除做成 typed action（先学接口、后学算法），
    短期不上 GRPO，先把 backend 设计成「未来可训练的 memory controller」。直接喂本站 BriefMem 的 typed memory 设计。

  architecture: |      # Mermaid 源码（架构/流程，前端懒渲染）
    ```mermaid
    flowchart TD
      T[任务规格 T] --> P{AgeMem Policy}
      C[短期上下文 C_t] --> P
      M[(长期记忆 M_t)] --> P
      P -->|LTM 动作| L[Add / Update / Delete]
      P -->|STM 动作| S[Retrieve / Summary / Filter]
      P -->|文本| A[回答/推理]
      L --> M
      S --> C
      A --> R[奖励: 任务完成 + 上下文管理 + 记忆质量<br/>惩罚: 上下文溢出/轮数过多]
      R -.->|step-wise GRPO: 终局优势广播回每一步| P
    ```

self_evo_use: >        # 客观：能否用于研究/自进化（向量召回 + 推理共用）
  能用。它是"记忆即动作"的可落地范式——自进化 agent 的记忆控制器可直接抄这套 typed action 接口 + 用冷审/反馈当 reward 的训练回路。
  属真自进化（系统从反馈改自己的记忆策略），不是固定流程。

