facets:
  problem_solved: 这是一个以 arXiv Paper Curator 为载体的生产式 RAG 课程仓库：从
    Docker/FastAPI/PostgreSQL/OpenSearch/Airflow 起步，逐周加上 arXiv 抓取、Docling
    解析、BM25、Jina 向量、Ollama 生成、Redis 缓存、Langfuse tracing、LangGraph agentic RAG 和
    Telegram bot。 人话说：它不是一个通用 agent 框架，而是一套可运行的课程型 AI 应用样板，把“每天抓 arXiv 论文、解析
    PDF、切块、建混合索引、回答问题、做观测和缓存、再加 agent 决策”串成一个项目。（来源：README What You'll
    Build；pyproject.toml dependencies；compose.yml services） 技术词解释：RAG 是“先检索资料，再让
    LLM 基于资料回答”；BM25 是关键词检索；hybrid search 是 BM25 加向量检索；LangGraph 在这里负责把
    guardrail、retrieve、grade_documents、rewrite_query、generate_answer
    编成状态图。（来源：src/services/agents/agentic_rag.py）
  method: 真实流程可以从“每天入库”和“用户提问”两条线看。 第一条线是数据进入系统。Airflow DAG
    `airflow/dags/arxiv_paper_ingestion.py` 的 `schedule="0 6 * * 1-5"`，默认参数含
    `retries=2`、`retry_delay=timedelta(minutes=30)`、`max_active_runs=1`。`fetch_daily_papers`
    会取 execution date 的前一天作为 `YYYYMMDD`，调用
    `metadata_fetcher.fetch_and_process_papers(max_results=arxiv_client.max_results,
    from_date=target_date, to_date=target_date, process_pdfs=True,
    store_to_db=True)`。（来源：airflow/dags/arxiv_ingestion/fetching.py）
    第二步是索引。`index_papers_hybrid` 从 PostgreSQL 取新论文，交给
    `HybridIndexingService.index_papers_batch(...,
    replace_existing=True)`。单篇论文会先走 `TextChunker.chunk_paper`：有 sections 时优先
    section-based chunking；100-800 words 的 section 直接成 chunk；小于 100 words 的
    section 合并；大于 800 words 的 section 再切；无 sections 时 fallback 到 word-based
    chunking，默认
    `chunk_size=600`、`overlap_size=100`、`min_chunk_size=100`。（来源：src/services/indexing/text_chunker.py；src/config.py
    …
  result: 下面把 README/课程文案中的主张拆开看。凡是 README
    的速度、生产级、完整性表述都按“自称”处理；凡是可以从代码、配置、测试树直接看到的机制按“已核实”处理。
    它把项目拆成每周一个工程层：基础设施、抓取、BM25、混合检索、LLM、监控缓存、agent 和 Telegram。 一次 agentic ask
    会先判断问题是不是 CS/AI/ML arXiv 论文范围；通过后发起检索工具调用；再让 LLM 判断检索内容是否相关；不相关则改写 query
    再检索；相关则生成答案。 它不是只做向量库检索；关键词检索和向量检索都发给 OpenSearch，结果用 RRF 排名融合。 它把论文数据管道做成
    Airflow 定时任务，而不是用户每次问问题时临时抓论文。 它声称完全相同的问题第二次会从 Redis 直接返回，速度显著提高。
    文档描述的是一个较完整的 Telegram 产品体验。 测试树说明作者试图覆盖 agentic 逻辑，但也暴露出文档/实现/测试不同步。
  innovation: 可复用的不是“整套课程文案”，而是几块工程拼法：数据管道、混合索引、agentic 状态图、exact cache、低成本移动入口。
    AgentState + Context 分离 OpenSearch 原生 hybrid + RRF Section-aware chunking
    fallback Exact-match cache as first optimization Out-of-scope guardrail with
    numeric threshold
  weakness: 风险主要来自外部服务和“文档比代码走得更远”。其中
    Jina、Ollama、OpenSearch、Langfuse、Telegram、Airflow 都不是可忽略依赖。
  transfer: 可复用的不是“整套课程文案”，而是几块工程拼法：数据管道、混合索引、agentic 状态图、exact cache、低成本移动入口。
    AgentState + Context 分离 OpenSearch 原生 hybrid + RRF Section-aware chunking
    fallback Exact-match cache as first optimization Out-of-scope guardrail with
    numeric threshold
