  method: 把"领域能力训练数据"当成可控流水线端到端生产:先建分层知识库(范围定义)→把知识点
    场景化成可检索查询去采真实素材(而非讲解材料)→按"技能维度"分层定向合成样本并配 CoT→ 三重过滤(自洽性重答一致 /
    去捷径:少量上下文还能答对就删 / 独立强模型逐步验证 CoT 证据支撑)→ 管线级质控(多模型池 + 每步抽样人验准入门槛 +
    去评测污染)。关键内核是「生成器≠评判器 + 去捷径 + 模型选型量化准入」三件套,把"模型造的数据"逼到可信。
  result: 对照"有去捷径过滤 vs 无"两版数据各训一个小模型, 在同一个去捷径评测集上比知识密集准确率; 再做"单模型生成 vs 多模型池生成"对照,
    看下游泛化差异;并量化最终语料的残噪率(抽样人核), 与"人工种子错误率"对齐当可接受基线。3-14 天。
  innovation: 把"领域能力训练数据"当成可控流水线端到端生产:先建分层知识库(范围定义)→把知识点
