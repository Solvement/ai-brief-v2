  problem_solved: evaluate-open-ended-end-to-end-autonomous-research-without-exact-match
  method: 评测端到端自主科研：每题锚定一篇真论文但对系统隐藏（hidden target），给问题/文献/原始数据，
    让系统从零走完"文献→处理数据→设计执行实验→出图→写报告"全流程； 用专家拆解的加权
    rubric（围绕目标论文关键科学产物的、可验证子项+技术关键词）逐项判分； 钉 50
    分=复现线、>50=真发现，把"复刻"与"超越"放进同一刻度。配极简 ReAct 壳（ResearchHarness）让裸 LLM 同台可比。
  result: 在 AI-Brief 冷审门上试：选 3 篇已深读论文，把每篇拆成 5-7 项加权 rubric（隐藏原 paper.mdx）， 让 judge
    对"新生成深读 vs grandfathered 金样"逐项打分；对比"整体打分 vs 逐项打分"的方差，
    验证逐项+关键词核对是否更稳、更能区分。再对失败深读做 6 类错误归因。3-7 天。
  innovation: ；；；；
  weakness: dry_lab_only；scores_final_not_process；single_judge_bias；rubric_caps_at_known；small_scale；all_self_reported
