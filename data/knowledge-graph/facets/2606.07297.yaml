core_concepts:
  - name: 轨迹接地的标准答案（trajectory-grounded ground truth）
    role: primary
    evidence: derive line-level ground truth from independent agent trajectories
      that successfully solved the same issue ... regions repeatedly surfaced
      across independent s…
  - name: 仓库探索作为独立评测靶（repository exploration as isolated target）
    role: primary
    evidence: isolates the evaluation of repository exploration ... formalize it as
      a ranked, line-level context selection task
  - name: 行级 recall 瓶颈（file-level strong, line-level recall-limited）
    role: primary
    evidence: file-level localization is already strong for modern methods,
      line-level coverage and efficient ranking remain the key axes ... their
      Rec ℓ remains only around…
  - name: 上下文效率（context efficiency）
    role: supporting
    evidence: Context Efficiency has the highest Pearson correlation (r=0.950),
      suggesting that useful context must be both relevant and compact
  - name: 缺上下文比冗余更致命（missing context dominates redundancy）
    role: supporting
    evidence: missing core evidence matters more than moderate precision loss, so
      recall-oriented improvements are more valuable than small filtering gains
