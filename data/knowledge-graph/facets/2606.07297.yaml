facets:
  problem_solved: isolate-and-measure-repository-exploration-with-trajectory-grounded-line-level-gt
  method: 把端到端 pass/fail 拆开，单拎"仓库探索"做行级可比评测：ground truth 不靠人工标，而从≥2 条成功修复 轨迹的 read
    动作取行级交集（+ LLM 精炼 + 人工审）得核心区域；explorer 只交 K=5 排序区域清单，
    沿覆盖（precision/recall/HitFile/HitRegion）×排序（行预算 nDCG@B、FUH）×效率（context
    efficiency、 noise）三维打分；再用受限上下文协议（只露选中区域喂固定 patcher）量上游指标对下游修复率的相关性，
    以此挑该信的指标。核心实测：coding agent 文件级强、行级 recall 是瓶颈；缺上下文比冗余更致命。
  result: 对一个 coding agent，量 HitFile vs Rec ℓ 的差（验证文件强/行弱）；再做缺/冗余上下文 sweep （藏 α%
    核心 vs 填等量噪声），画修复率曲线验"缺>冗余"。3-10 天。
  innovation: 评 agent 检索别只看文件命中；翻到对的文件只是到街区，关键是承重的那些行有没有读全（行级
    recall）。；高覆盖区里缺核心证据比多塞无关代码致命得多；喂上下文宁全勿漏，先保召回再谈紧凑。；行 recall
    天花板靠更好的探索机制（迭代代码图搜索如 CoSIL）突破，换更强 patcher 不解决探索瓶颈。；给某能力造 ground
    truth，先找'多条成功轨迹的交集'，比雇人标既省又稳，且天然接地于成功行为。
  weakness: self_report_only；solved_issue_bias；refine_subjectivity；hyperparam_sensitivity
  transfer: Mini 版：录几条成功 agent 轨迹，抽 read 动作（编辑器查看/cat/sed -n/grep -n）取行级交集做迷你靶； 让
    explorer 交 K=5 区域，算 precision/recall/HitFile/nDCG@B/CtxEff；做缺/冗余上下文消融看下游差。
    本项目可用此法评 AutoSci/codex 子 agent 的"找相关代码"质量，并落实"召回优先于过滤"的喂料策略。100-400 行起步。
