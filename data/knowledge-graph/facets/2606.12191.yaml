  problem_solved: model-synthesize-evaluate-and-evolve-agentic-environments-for-self-improving-agents
  method: 把 LLM agent 的“环境”从临时 benchmark / sandbox / world model 升级为可建模、可合成、可评估、
    可演化的工程对象：先用 POMDP 定义状态、动作、转移、奖励和观察；再用 8 组属性与 8 个任务领域定位环境； 合成侧分 symbolic
    synthesis 与 neural synthesis；质量门分 correctness、diversity、complexity、fidelity；
    应用侧分 agent evolution 4 路径与 environment evolution 3 范式。对 AutoSci 的直接启发是：
    自进化不能只改 agent 自身，也要把“训练场/评测场”做成会验证、会调难度、会扩分布的环境层。
  result: 综述归纳；没有作者自做实验或 benchmark；空白点多为定性判断。
