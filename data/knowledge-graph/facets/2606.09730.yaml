facets:
  problem_solved: train-delegation-intelligence-for-long-horizon-context-management
  method: 把"主派发-子执行"的委托做成可训练能力：一套四原则 harness（鼓励委托 / 全交接 brief / 主代理保留方向判断 /
    子代理报告引用落地）在推理时逼出高质量委托轨迹 → 过滤（只留答对主轨迹、 去重复调用与假引用）→ environment-masking SFT
    蒸进权重。关键 reframe：委托 = 单模型的 内容感知上下文管理（子代理是同一模型的 fresh context，brief/report
    替代固定规则截断）。 关键教训：委托行为不会从 harness 自发涌现，必须显式训练/硬约束固化。
  result: 同一组深研问题，对照"委托 harness vs 单代理 baseline"的答对率与主代理 token 占用；再做 harness 消融：
    只加委托工具 vs 加四原则，看委托调用频率与质量差。1-7 天（订阅 CLI 不微调时只验 harness 端，不验 SFT 端）。
  innovation: 长程任务提前把 token 贵、认知浅的体力活外包给独立 context 子代理，只回收带引用的压缩报告；不要等 context
    溢出再截断/摘要。；把每个交接简报当'给新同事的入职文档'写（为什么重要/已确认/待定/已排除），下游有用度直接由 brief
    完整度决定。；子代理只搜证据、测假设；追哪个假设/何时收尾/矛盾怎么裁必须主代理独立定，否则错误累积传播。；好 harness 是必要不充分；能微调就
    SFT 蒸进权重，不能微调就把约束写得更硬——别指望模型自觉学会复杂委托。
  weakness: self_report_only；preliminary_exploration；no_total_compute_saving；single_level_only；needs_verifiable_answer
  transfer: Mini 版：给一个多步检索 agent 加 call_sub_agent 工具 + 抄 Appendix B 主/子提示词；主代理只收
    子代理的摘要 report、强制 inline 引用；录成功轨迹→写过滤器去重复调用/假引用。100-300 行可跑通。 本项目可直接拿四原则审计现有
    AutoSci 子 agent 派发，量化 brief 字段缺漏与 context 占用。
