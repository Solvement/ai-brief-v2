core_concepts:
  - name: 委托智能（delegation intelligence）
    role: primary
    evidence: the ability to decompose complex tasks, determine when and what to
      delegate, and integrate returned results into the ongoing workflow
  - name: 委托即上下文管理（delegation as context management）
    role: primary
    evidence: single-agent context management ... the model manages its own context
      more intelligently, using the model-generated brief and report as a
      content-aware compres…
  - name: harness 引导轨迹蒸馏（harness-guided trajectory to SFT）
    role: primary
    evidence: The harness-guided trajectories naturally encode correct delegation
      decisions, which we use as supervised fine-tuning data to internalize
      delegation intelligen…
  - name: 全交接简报（comprehensive briefing）
    role: supporting
    evidence: write each brief as if addressing a new collaborator joining the
      investigation ... why this subtask matters ... what has been established
      so far, what remains …
  - name: 带环境屏蔽的监督微调（SFT with environment masking）
    role: supporting
    evidence: The loss is computed only over model outputs a_t; all environment
      returns o_t are masked
discovery_trace:
  hypothesis: 一套足够好的 harness（四原则系统提示词）应能在推理时直接激发委托行为，可能无需训练
  failed_attempts: 把完整 harness 套在未微调的 Tongyi DeepResearch（Tongyi DR Swarm）上，模型从不调用
    call_sub_agent，行为退化成普通 Tongyi DR——委托未自发涌现；harness 消融显示只加委托工具仅
    +2.3，需四原则把轨迹质量拉高且训练固化才稳定
  source_span: 原文 §3.2 末尾 'We additionally report Tongyi DR Swarm ...' + §3.3
    harness 消融（47.7→50.0→57.7）
