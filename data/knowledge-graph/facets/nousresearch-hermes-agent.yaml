    type: contradicts
    evidence: "两者都想做自进化记忆：agemem 把记忆操作做成可被 RL 训练的策略动作（学习式），hermes 的 SKILL.md 是规则式生成/编辑技能文件（无策略学习）——对『记忆策略怎么进化』给出相反答案：学出来 vs 写出来。"
