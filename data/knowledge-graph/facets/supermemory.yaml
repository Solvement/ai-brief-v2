node_id: content/supermemory
slug: supermemory
kind: project
title: "supermemory — 一个 API 全包的有状态记忆引擎（记忆≠RAG）"
source: "repo github.com/supermemoryai/supermemory (Bun/Turborepo monorepo, MIT)"

facets:
  problem_solved: >    # Y
    AI 应用对话即忘，逼用户反复澄清、破坏个性化；自己搭记忆栈又要配向量库、嵌入管线、分块策略、用户画像系统一大堆底层。

  method: >            # X：大白话 + 例子
    把记忆当成一张"随时间更新的事实知识图谱"，而不是文档分块。像一个会自己整理的私人助理：
    用 LLM 从对话里抽出原子事实存进去；当新信息和旧事实冲突（"我搬到 SF" vs "我住 NYC"）自动消解、覆盖旧的；
    临时事实（"我明天有考试"）到点自动过期遗忘。用户画像分静态（长期偏好/身份）+ 动态（近期活动/项目），一次调用即取（自报延迟约 50ms）。
    对外用单一 API/MCP 暴露：client.add() 存任意内容自动抽取索引、client.profile() 取画像、search.memories() 做混合搜索（个人记忆 + 知识库 RAG 同时检索）；
    用 containerTag 做多项目/多租户隔离。开发者不用碰向量库、嵌入、分块。

  result: >            # Z：自报（README，未独立复现）
    [自报] 三大 AI 记忆基准 LongMemEval / LoCoMo / ConvoMem 均排名第一；
    [自报] 用户画像一次调用取静态+动态事实、延迟约 50ms。原仓库未附评测代码/数据/复现命令（artifact_audit 多项 not_found），分数无配置细节、未独立核验。

  innovation: >        # 创新
    赛道里 mem0/Zep 也做记忆，supermemory 的卖点是"全栈即插即用 + 范式叙事"：把记忆、RAG、用户画像、连接器（Drive/Gmail/Notion webhook 实时同步）、
    文件处理打包进单一 API，并明确把"有状态记忆（自动更新/遗忘/消解矛盾）"和"无状态 RAG 检索"区分开。原生集成 8+ 框架（Claude Code/Cursor/Vercel AI SDK/LangChain/Mastra）。

  weakness: >          # 缺点/边界/坑
    最大风险是云依赖与不透明：核心记忆处理走 hosted API，自托管方案 README 未说明（厂商锁定 + 数据主权风险，离线/内网受限）；
    高度封装掩盖底层，遇问题难调优调试；artifact 证据偏薄——无 tests、无 examples、无 benchmark 代码、存储后端只能从 tech stack（Cloudflare Workers/KV/Postgres/Drizzle）推测，非实证；
    多模态提取（PDF/视频/代码）无准确率数据；自动遗忘/更新出错可能丢重要信息；wrapper 集成的维护状态未知。

  transfer: >          # 能迁移到什么 / 研究·自进化
    值得借的是设计模式而非实现（实现依赖其内部托管推理管线，要完全掌控须评估自托管可行性）：
    ① "事实抽取→画像构建→混合搜索（RAG+记忆）→连接器"的记忆引擎分层；② containerTag 多租户/多项目隔离，可直接用于 BriefMem 组织多项目记忆；
    ③ "静态画像+动态活动"的上下文注入；④ 自动遗忘/矛盾消解逻辑可作 BriefMem 处理过时知识的参考机制。

  architecture: |
    ```mermaid
    flowchart TD
      IN[对话/文档/URL/连接器<br/>Drive·Gmail·Notion webhook] --> EX[LLM 事实抽取]
      EX --> RES{冲突消解}
      RES -->|覆盖旧事实| KG[(有状态事实知识图谱)]
      RES -->|临时事实到点过期| FORGET[自动遗忘]
      KG --> PROF[用户画像<br/>静态偏好 + 动态活动]
      Q[查询] --> HS[混合搜索<br/>个人记忆 + 知识库 RAG]
      KG --> HS
      PROF -->|/context 注入| AGENT[Agent / 应用]
      HS --> AGENT
      subgraph 对外
        MCP[MCP: memory/recall/context]; SDK[SDK: add/profile/search]
      end
      CT[containerTag 多项目隔离] -.-> KG
    ```

self_evo_use: >
  有限可用、且要打折。它的"自动遗忘 + 矛盾消解 + 画像随对话演进"确实是自进化记忆需要的能力，可当设计参考；
  但记忆处理是黑箱托管 API、无自托管、无开放评测，无法当可掌控的自进化记忆引擎核心，更适合当"它是怎么把记忆当有状态图谱来做的"概念参照，不适合直接做研究底座。

