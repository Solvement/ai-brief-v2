schema: v2
node_id: paper:2605.31584
slug: longtracerl
kind: paper
title: "LongTraceRL — 用搜索 agent 真实轨迹造高混淆干扰 + 实体级过程奖励，练长上下文推理"
source: "arxiv:2605.31584（2026-05-29，THU-KEG，HF upvotes 41）+ content/papers/2605.31584-longtracerl-rubric-rewards + repo github.com/THU-KEG/LongTraceRL（4B/8B/30B 模型已开源）"

facets:
  problem_solved: >    # Y：一句犀利
    长上下文 RL 的两个硬伤：训练数据的干扰文档是随机抽的、一眼能筛掉，练不出「在高度相似内容里辨别」；
    奖励只看最终答案对不对，几十万 token 输入下信号又稀又吵——模型走错路也能蒙对（中间引错实体照样拿满分），
    检索失败被结果奖励整个掩盖。真问题不是「读不到」，是「干扰不够像 + 奖励管不到中间步」。

  method: >            # X：大白话 + 类比
    两半：一个造数据的工厂 + 一个改奖励的开关。数据工厂像「出一套刁钻考题，干扰项全是学霸真做题时差点选错的选项」：
    先在 KILT Wikipedia 超链接图上随机游走 8 跳、让强模型据路径合成一道必须逐跳推理的八跳题并吐出每跳黄金实体；
    再让一个搜索 agent（search/open/cite）真去答题、每题采 5 条轨迹只留答对的；然后把 agent「读了却没引用」的文档
    当 Tier-1 高混淆干扰（它一度觉得值得读，最像）、「搜到但没点开」的当 Tier-2，先塞 Tier-1 不够 128K 再补 Tier-2，打乱防位置捷径。
    奖励侧：rubric 分 = 回答命中的黄金实体占比（实体召回率），在 GRPO 组内除以最大值归一；
    关键防作弊开关 positive-only——r=(1−α)·r_oc+α·r_rb 只在最终答对时才算，答错一律 0 分，
    让过程分只在「答对的回答之间」分高下：奖励答对且中间扎实的，压低蒙对的。默认 α=0.3。

  result: >            # Z：真实数字，标自报
    [自报·论文 Table 1-5，未独立复现] 训练 2,815 条八跳 128K QA，GRPO G=8 / 200 步 / 32×H800。
    五 benchmark 平均：Qwen3-4B-Thinking 53.3→59.0（+5.7 over base / +2.5 over 最强基线 LongRLVR）；
    DeepSeek-R1-0528-Qwen3-8B 42.7→43.8（仅 +1.1）；Qwen3-30B-A3B 60.5→63.7（+3.2）；最难的 AA-LCR 上 4B 33.2→41.8（+8.6）。
    三个基线数据集在 8B 上反而负优化（42.7 拉到 40.6/40.1/40.9）。消融：去 rubric 奖励 4B 平均 59.0→53.7（增益几乎全没）；
    去 positive-only 59.0→57.1（AA-LCR −4.8、MRCR −5.3）；α=0.5 过强反伤（57.1）。
    干扰难度与下游分严格同序：traj-tiered 59.0 > search 56.7 > random 55.7，对应「含黄金实体比例」50.03% > 15.00% > 1.35%，Tier-1 单独高达 63.23%（随机抽仅 1.35%）。

  innovation: >        # 创新：同赛道对比
    同赛道过程奖励——LongRLVR 用 chunk 级 F_β 上下文奖励、LongR 用冻结 verifier 算文档信息增益、EAPO 用协同进化奖励模型给证据抽取打分——
    粒度都比本文粗；本文把过程监督做到「推理链每跳的黄金实体」这个实体级。出题法承自 DeepDive 的 KG 随机游走+多轮 RL。
    真正的新点有三：① 干扰物不随机抽、不靠 embedding 相似，而用 agent 真实搜索行为里「读了没引」的文档，混淆度可量化可分级；
    ② positive-only 开关——意识到 rubric 分本质是实体召回率不是推理正确性，必须只发给答对者才不被「堆实体名」刷分；
    ③ 用「干扰含黄金实体比例」把数据难度从玄学变成可测设计变量，且实测难度排名与下游分排名一致。

  weakness: >          # 缺点/适用边界/坑
    绝对增益偏小且对骨干敏感：8B 上只有 +1.1，远小于 4B 的 +5.7——方法方向对但收益不均匀，别夸大。
    rubric 分度量的是「该提的实体提没提」，不是推理逻辑对不对；脱离 positive-only 单用会直接助长 reward hacking。
    训练问题全部源自 KILT Wikipedia 单一知识源，推理模式多样性可能受限；干扰质量依赖采集轨迹那个搜索 agent 的能力，
    换强/弱 agent 干扰分布就变，泛化性存疑。全部分数为论文自报；只给训练侧配置，数据合成的算力/成本账未披露。

  transfer: >          # 指向本站自进化用途
    最值得搬的是两条工程心法。① 「难负例不该随机造，该从真实处理轨迹的副产物里捞」：AI-Brief 的判边 NO_EDGE 候选、
    冷审 borderline 稿、选稿淘汰项，正是自家 agent「读了却没采纳」的高混淆样本——拿它们当质量门/判边器的对抗测试集，
    比随机抽负例难得多，且难度可用类似「含黄金要素比例」量化。② positive-only 心法：过程分（rubric 评分、结构检查分）
    只对结果过门的产出发放，防止深读/facet 被「堆关键词、堆实体名」刷过程分——这正是冷审 rubric 设计该有的防作弊开关。
    与 [[tropd]] 的「监督信号先过可靠度门」互补：那条管该不该信老师，这条管过程分该不该发。

  architecture: |      # Mermaid（从 paper.mdx 精简改写）
    ```mermaid
    flowchart TD
      KG([KILT Wikipedia 超链接图]) --> WALK[随机游走 8 跳得实体路径]
      WALK --> QGEN[强模型合成八跳问题<br/>+ 吐出每跳黄金实体]
      QGEN --> AGENT[搜索 agent 真去答题<br/>search/open/cite, 每题 5 条留答对]
      AGENT --> TIER[分级干扰: Tier-1 读了没引<br/>Tier-2 搜到没点开]
      TIER --> ASM[traj-tiered 装配到 128K<br/>先 Tier-1 后 Tier-2 再打乱]
      ASM --> RL[GRPO 训练 G=8]
      QGEN -. 黄金实体 .-> RUB[rubric 奖励: 实体召回率<br/>组内归一]
      RL --> GATE{结果奖励 r_oc>0 ?}
      GATE -->|是| COMB[组合奖励 1-a 结果 + a 过程, a=0.3]
      GATE -->|否| ZERO[奖励=0 positive-only]
      RUB --> COMB
    ```

self_evo_use: >        # 客观判断（记忆/理解/自进化 三段）
  记忆：部分相关——处理的是长轨迹内的信息利用（读了没采纳的产物当难例），不提供持久记忆机制。

  理解：能用（失败归因方法论）——「高混淆负样本工厂」用自家 agent 真实轨迹造难度可量化的难例，正是把判边/冷审 benchmark 做强的路子（正合 RULES#18「先把 benchmark 做强」）。

  自进化：能用（方法论原语，非可跑系统——本站没有 RL 训练栈，不是抄它的 GRPO 管线）。「positive-only 过程分门」可用于任何 rubric 式评分——过程分只发给结果过门者，防堆关键词刷分。代码/模型已开源（4B/8B/30B），但 32×H800 的训练本站不可复现，借的是设计不是栈。

core_concepts:
  - name: rubric reward（实体级评分细则奖励）
    role: primary
    evidence: "回答里命中的黄金实体 / 全部黄金实体(实体召回率);再在 GRPO 的一组回答内除以组内最大值归一化到 [0,1]"
  - name: positive-only（只给正例的过程分门）
    role: primary
    evidence: "过程分只发给最终答对的回答;答错的一律 0 分。防止模型靠堆实体名刷过程分"
  - name: 轨迹分级干扰（traj-tiered distractor）
    role: primary
    evidence: "Tier-1(高混淆)= agent「读了却没引用」的文档(它一度觉得值得读,最像);Tier-2(低混淆)= 出现在搜索结果里但 agent 压根没点开的"
  - name: 知识图谱随机游走出题（KG random-walk QA synthesis）
    role: supporting
    evidence: "在 KILT 版 Wikipedia 的超链接图上,从一个种子实体出发走 k=8 跳……合成一道「必须逐跳推理、不能靠关键词匹配抄近路」的八跳问题"
  - name: GRPO（组相对策略优化）
    role: supporting
    evidence: "GRPO 每题采一组 G 个回答,把每个回答的原始 rubric 分 r̂_rb 除以这组里的最大值"

