# 语义近邻 NO_EDGE 判断：
# tropd(都在给不可信监督信号装门)：心法相似——强信号先过门再进训练回路，但对象不同（蒸馏逐 token 信任度 vs RL 过程分发放条件），互不引用、无共享机制 → NO_EDGE
# grepseek(同用 GRPO + 防刷分奖励设计)：格式门×token-F1 管检索输出格式，positive-only×实体召回管长上下文过程监督，赛道不同、无方法承继 → NO_EDGE
# agemem(step-wise GRPO 过程级奖励)：同属「过程监督」家族但粒度与域（记忆操作 vs 长上下文多跳）不同，原文无引用链 → NO_EDGE
