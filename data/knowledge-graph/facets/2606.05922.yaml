core_concepts:
  - name: 自进化 agent
    role: primary
    evidence: agents that keep improving from the experience they accumulate in
      deployment
  - name: 难度×多样性 DPP 核心集（difficulty-diversity DPP coreset）
    role: primary
    evidence: select a diverse coreset of challenging tasks
  - name: 双信号回溯诊断（self-validation × self-consistency）
    role: primary
    evidence: self-validation within a trajectory and self-consistency across
      parallel trajectories
  - name: Best-of-N 自偏好择优 + 严格优于闸（accept only if S_j>0）
    role: primary
    evidence: selects the most effective one by its own pairwise self-preference
  - name: 可执行反馈（executable feedback）
    role: supporting
    evidence: executable scripts as tools, along with text files for skills and
      instructions
