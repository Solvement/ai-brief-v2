schema: v2
node_id: content/ai-scientist-v2
slug: ai-scientist-v2
kind: project
title: "AI-Scientist-v2 — 把科研做成树搜索的全自主科学家"
source: "github.com/SakanaAI/AI-Scientist-v2 + deep-dive ai-scientist-v2"
facets:
  problem_solved: >
    自动科研要么靠人先写死实验模板（v1 的做法，换个领域就失效），要么一锤子让 LLM 跑一次实验、不会回头改方向——
    缺一个能自己「试一条路、不行就退回去换条路」的探索机制。
  method: >
    把「从想法到论文」整个过程做成一棵会长大的实验树：每个节点 = 一次独立实验（一段 LLM 写的代码 + 跑出来的结果 + 打分）。
    一个 experiment manager（既当规划者又当评委）每轮看所有叶子，挑最有希望的那个往下扩展（best-first，类似下棋只深算最有戏的几步），
    跑出新结果再打分，直到步数耗尽。前面有 ideation agent 反复生成+反思憋出研究想法，后面接 writeup + 自评审。
    短期记忆 = 把当前节点这一路的历史塞进 prompt；外部知识 = Semantic Scholar 查文献做新颖性检查。
  result: >
    [自报] 声称产出了首篇「完全由 AI 撰写、并通过同行评审被 workshop 接收」的论文（README 链到 ICLR2025 Workshop 实验 repo，但无直接接收通知，evidence_strength=medium）；
    [自报] 一次完整运行用 Claude 3.5 Sonnet 实验阶段约 $15-20、写作约 $5（README FAQ，无账单截图）。无跨领域成功率统计。
  innovation: >
    创新点是「用 best-first 树搜索替代固定实验模板」——把科研当成一个可回溯的搜索问题，而不是一条直线 pipeline；
    experiment manager 同时担任 planner + critic，让系统能自己决定深挖哪条路、何时停手进入写作。相比 v1 去掉了人写模板的依赖。
  weakness: >
    系统本身没内建沙箱——README 明说会执行 LLM 写的代码，安全完全甩给用户（推荐 Docker，但不强制）；
    论文接收可能是 cherry-pick，普遍成功率未知；跨领域泛化只在少数类似任务验证、无对比数据；artifact 偏薄（无 tests/CI、自定义非标准 license）；成功率强依赖底层模型，弱模型可能频繁失败。
  transfer: >
    最值得抄的是「agentic best-first tree search loop + experiment manager」这套可回溯探索骨架——任何需要逐步试错、动态调方向的任务
    （超参搜索、自进化 agent 的策略探索）都能套。对自进化 agent：树节点的「实验代码+结果+评分」三元组天然是一条可学习的轨迹。
    但它的代码执行接口不可直接搬到生产，必须先补严格沙箱。
  architecture: |
    ```mermaid
    flowchart TD
      TOPIC[主题描述 .md] --> IDEA[Ideation Agent<br/>生成+反思 → 结构化想法]
      IDEA --> ROOT[根节点: JSON 研究想法]
      ROOT --> EM{Experiment Manager<br/>planner + critic}
      EM -->|best-first 选最有希望叶子| EXP[扩展: LLM 生成代码变体 → 跑实验]
      EXP --> NODE[新节点: 代码 + 结果 + 评分]
      NODE --> EM
      EM -->|达到 steps 上限/预算耗尽| WRITE[Writeup → 论文草稿]
      WRITE --> REVIEW[自我评审]
      LIT[(Semantic Scholar 文献)] -.新颖性检查/引用.-> EM
      NODE -. 持久化到实验日志树 .-> STATE[(搜索树状态)]
    ```
core_concepts:
  - name: 实验树搜索
    role: primary
    evidence: "深读 reasoning_trace.central_contribution 逐字『通过 agentic best-first tree search 实现了从话题到 workshop 论文的端到端自主科研』；技术拆解 Agent Loop 逐字『核心循环是最优优先树搜索：根据 JSON 格式的研究想法创建根节点 → 实验管理器 agent 评估当前所有叶子节点，选择最有希望的节点进行扩展（best-first）→ 对选中节点生成代码变体并运行实验 → 达到 steps 上限停止』。"
  - name: 实验管理器 agent
    role: primary
    evidence: "深读 Planner 节逐字『Experiment Manager：在树搜索中扮演 planner + critic 角色，决定扩展哪个节点、如何修改代码、何时停止并进入写稿阶段』；系统概览逐字『一个 experiment manager agent 决定搜索方向』。"
  - name: 想法生成 agent
    role: supporting
    evidence: "深读 Planner 节逐字『Ideation Agent：根据用户提供的主题描述 Markdown，通过反复生成与反思（reflection）产生结构化研究想法列表』——是树搜索根节点的供给者（规范名取『想法生成 agent』，源文原词 Ideation Agent）。"
  - name: 代码执行沙箱
    role: supporting
    evidence: "深读 Tool Interface 逐字『代码执行工具：在本地 GPU 环境中运行由 LLM 生成的 Python 实验代码』+ Sandbox 节逐字『This codebase will execute LLM-written code，推荐在 Docker 容器等受控环境中运行。系统本身未内建沙盒机制，依赖外部隔离』——规范名『代码执行沙箱』指代源文的『代码执行工具 + Sandbox』这一对。"
  - name: 文献新颖性检查
    role: mentioned
    evidence: "深读 Tool Interface 逐字『文献搜索工具：通过 Semantic Scholar API 进行新颖性检查和引用收集，依赖 S2_API_KEY』——规范名『文献新颖性检查』取自源文原词『文献搜索工具…新颖性检查』。"
self_evo_use: >        # 客观判断（记忆/理解/自进化 三段）
  记忆：不提供——短期记忆只活在树搜索内部，不会把经验沉淀成可复用技能/记忆（那部分要靠 hermes-agent 的 skills 或 agemem 的可训练记忆补）。

  理解：部分——experiment manager 的评分与方向选择是「提出假设→实验→评分→改方向」的理解闭环骨架，可作为本站研究 loop 的结构参照。

  自进化：能用，作为「探索引擎」原语——示范了怎么把试错过程结构化成一棵可回溯的树、用 manager 节点做选择与停止判断。局限：它的「学习」是搜索内的方向调整，非持久自进化。
