# 语义近邻 NO_EDGE 判断：
# MemoryAgentBench（四维能力 AR/TTL/LRU/CR）：同为 agent 评测 benchmark，但测记忆操作能力，与调解/多轮社交冲突无任何共享概念或架构 → NO_EDGE
# AI-Scientist-v2（实验管理器 agent）：都用 agentic pipeline 生成场景/实验，但 AI-Scientist 是科研自动化，SoCRATES 是调解评测框架，领域与方法论均不重叠 → NO_EDGE
# AgeMem（三阶段课程 + step-wise GRPO）：都有多轮对话轨迹，但 AgeMem 测记忆操作训练，SoCRATES 测调解行为评估，task-type 与方法论均不共享 → NO_EDGE
# LongTraceRL（轨迹分级干扰）：都有长上下文多轮轨迹，但 LongTraceRL 是训练方法，SoCRATES 是评测框架，问题定义无交叉 → NO_EDGE
# TrOPD（trust region + off-policy guidance）：都涉及「评估某个 token/回合是否可信」的逻辑，但 TrOPD 是训练时监督信号可靠度，SoCRATES 是推理时评测噪声隔离，层次和机制完全不同 → NO_EDGE
