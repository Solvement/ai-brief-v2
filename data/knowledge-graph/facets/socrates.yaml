# Mind Palace facet — 内化层（AI-only）。spine：用议题局部化评估器+单轴扰动解决 LLM 调解评测尺乱晃问题，展现 topic-localized evaluator 与专家一致性 r=0.823/0.801（自报），最强 mediator Consensus Gain 仅 34.4（自报）；坑=全仿真无真人、代码未发布。
