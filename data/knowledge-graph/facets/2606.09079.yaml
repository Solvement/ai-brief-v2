core_concepts:
  - name: 前瞻稀疏注意力（lookahead sparse attention）
    role: primary
    evidence: proactively predicts future context demands and preserves only the
      query-critical KV chunks in the GPU memory
  - name: 解耦训练（backbone-free decoupled training）
    role: primary
    evidence: train it independently using standard retrieval training frameworks
      without ever loading the massive backbone model into GPU memory
  - name: 阈值召回（threshold-based recall）
    role: supporting
    evidence: we replace the rigid Top-k selector with a threshold-based mechanism
      to recall a dynamic number of historical entries
  - name: 跨层多数投票（cross-layer majority voting）
    role: supporting
    evidence: uses a Cross-Layer Majority Voting mechanism to identify the true
      "golden entries"
  - name: oracle 诊断（oracle simulation）
    role: mentioned
    evidence: "we conducted a rigorous oracle simulation: we pre-computed the global
      golden attention weights"
discovery_trace:
  hypothesis: 该留哪些 KV 可以表述为独立的双塔检索问题,从而在不加载骨干的情况下便宜地训练与搜索架构
  failed_attempts:
    - 浅层放索引器:早期探索发现浅层只装低级 token 统计,lookahead 预测奇差(§2.4)
    - 8 层联合索引(6-20 层):召回 mask 过松,实测取 30-49% 历史块进显存,违背省内存初衷 → 退到 10/12/20 三层
      Pareto 甜点(§2.4)
    - pairwise→pointwise 链式训练:无统计增益,弃(§2.4)
    - LLM 标注语义块当强负例:引入二次标签噪声,随机负采样反而更稳,弃(§2.4)
    - 按层匹配数加权 loss:精度微涨但伤召回下界,违背安全网目标,弃(§2.4)
    - 初始假设'上下文无关时 Sigmoid 门塌缩到零召回 → O(1) 内存':No-Context 对抗测试证伪,绝对块数随长度涨 2.5
      倍(§3.3.1)
    - 初始假设'点式打分可短训长推到 1M+':实测在训练长度 2 倍处硬性崩坏,归因位置编码出分布(§3.3.3)
  source_span: 原文 §2.3(解耦动机)、§2.4(层配置探索与 500-run 扫描、被排除 trick、Note on
    Hyperparameter Selection)、§3.3.1/§3.3.3(两个被推翻的假设);对应
    paper.mdx「解法是怎么找到的(选读)」节
