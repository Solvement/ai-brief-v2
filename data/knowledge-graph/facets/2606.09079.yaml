facets:
  problem_solved: keep-only-predicted-relevant-state-in-expensive-resource
  method: 把"贵资源里该驻留什么"从被动携带改成主动预测:小检索器(双塔,文档侧表示冻结预计算) 周期性(每 τ
    步)预测未来窗口要用的记忆块,阈值召回(≥0.5 全取、允许零召回)从冷存预取; 标签由冻结宿主离线自产并经
    Softmax→Top-p→跨源多数投票去噪;训练与宿主物理解耦 (只训 <0.1% 查询端,单个 H20 GPU-hour
    收敛),实验吞吐(8×H20 一周 500 次扫描)本身成为架构发现引擎。
  result: 在 mind-palace 召回上做两改造实验:① Top-k 改阈值召回,统计"空手而归"比例与下游
    引用命中率(预期:低相关查询空手率上升、假引用下降,呼应零假边精神);② 复刻 oracle
    诊断:把人工挑的金记忆直喂生成端,若仍答错则瓶颈在生成不在召回。各 1-2 天。
  innovation: 贵资源(显存/上下文窗)只放'预测会用到的',其余冷存按需搬——上下文管理是预测问题不是携带问题。；把宿主和文档侧表示全部冻结预计算,只训
    <0.1% 的查询端小件 → 单个 H20 GPU-hour 收敛,8×H20 一周 500 次扫描;实验吞吐本身是架构发现的前提。；固定 Top-k
    强迫召回固定数量,既是标签噪声源也是资源浪费源;阈值召回让数量随置信度动态、允许零召回。；宿主自产标签噪声极大(naive 并集 ~10000
    正样本/窗);Softmax→Top-p→跨层 ≥3/21 多数投票压到 100-1000 才可训。；组件背锅还是任务本质难?把真值直喂下游:MRCR
    给 50% 金块仍掉 2% → 任务需要密集全局记忆,非索引器之过;另三个基准 10-25% 金块即 100% 保底。；被排除的
    trick(pairwise 链式/强负例挖掘/加权 loss)和被推翻的假设(O(1) 内存/无限长度泛化)写成正式章节,各带证据。
  weakness: false_positive_leak；capacity_ceiling；length_generalization_2x；host_specific_labels；immature_no_ablation；release_not_production_stack；versioned_source_drift
  transfer: 应用层复刻不必动注意力:给长程 agent 加预取层——便宜 embedding 模型每个任务段预测
    要装载的记忆条目(阈值召回),其余不进上下文;对照①每步全量带历史②只带最近 N 条 ③随机带 k 条,量 token
    成本与任务成功率。标签可用"事后真被引用的记忆"自产。3-5 天。
