# ROS L2 · 概念注册表（schema: ros-v1）
# 同名异义的解药："memory" 一词的每种实体各占一条。私有术语禁止直接进图。
- id: mem.learned-policy-controller
  name: 可学习的记忆操作策略
  type: mechanism-family
  description: 把记忆操作（写入/更新/删除/检索等）建模为可训练的策略动作，由反馈信号优化。
  aliases: [learned memory policy, agentic memory operations, 记忆即策略动作]
  distinct_from: [mem.fixed-rule-hooks]
  conflicts_with: []

- id: mem.fixed-rule-hooks
  name: 固定规则记忆钩子
  type: mechanism-family
  description: 通过写死的 hook/规则流程控制记忆写入与检索；可控、可解释、易调试，适应性弱。
  aliases: [fixed memory hooks, rule-based memory management]
  distinct_from: [mem.learned-policy-controller]
  conflicts_with: []

- id: mem.external-vector-store
  name: 外部向量库记忆
  type: data-structure
  description: 嵌入+向量检索的外部存储；记忆=被动存取的检索索引。
  aliases: [vector memory, RAG memory]
  distinct_from: [mem.local-verbatim-log, mem.fact-graph]
  conflicts_with: []

- id: mem.local-verbatim-log
  name: 本地逐字记录
  type: data-structure
  description: 本地保存原始交互/文本记录，不做摘要压缩，保真可追溯。
  aliases: [verbatim memory, local raw log]
  distinct_from: [mem.fact-graph, mem.external-vector-store]
  conflicts_with: []

- id: mem.fact-graph
  name: 事实图谱记忆
  type: data-structure
  description: 抽取实体/事实/关系形成结构化图谱，支持冲突检测与跨文档合并；有抽取损失。
  aliases: [fact graph, structured memory graph]
  distinct_from: [mem.local-verbatim-log]
  conflicts_with: []

- id: train.terminal-credit-broadcast
  name: 终局信用广播训练
  type: training-scheme
  description: 把终局奖励/优势广播回轨迹中每一步，给拿不到即时监督的早期决策延迟信用（如 step-wise GRPO）。
  aliases: [step-wise GRPO, terminal advantage broadcast]
  distinct_from: []
  conflicts_with: []

- id: eval.lifecycle-dimensions
  name: 记忆生命周期评测维度
  type: eval-dimension
  description: 超出检索命中率的评测轴——更新/遗忘/冲突消解/长期任务收益。
  aliases: [memory lifecycle eval]
  distinct_from: []
  conflicts_with: []

- id: eval.incremental-multi-turn-protocol
  name: 增量多轮记忆评测协议
  type: eval-dimension
  description: 评测时把长输入按多轮增量喂给记忆系统（而非一次性全量），逼出真实的写入/更新时序行为——是"供给方式"协议，独立于评什么轴。（2026-06-12 由 memoryagentbench 蒸馏转正）
  aliases: [incremental multi-turn feeding, chunked memory injection protocol]
  distinct_from: [eval.lifecycle-dimensions]
  conflicts_with: []

- id: mem.scoped-retrieval-index
  name: 范围化检索索引
  type: mechanism-family
  description: 把实体/项目/主题等作为结构化元数据维度，检索先按范围收窄再搜，而非在扁平向量库全量召回。（2026-06-12 由 mempalace 蒸馏转正）
  aliases: [scoped retrieval, wings/rooms/drawers, namespace-scoped memory]
  distinct_from: [mem.external-vector-store]
  conflicts_with: []

# ——— 2026-06-12 波次 1 收口转正（kvarn/tropd/longtracerl/latentskill/scaling）———
- id: train.entity-level-process-reward
  name: 实体级过程奖励
  type: training-scheme
  description: 用可枚举的实体/要点召回构造逐跳稠密过程分（rubric reward），替代整轨迹单一终局信号。（longtracerl）
  aliases: [rubric reward, entity recall process reward]
  distinct_from: [train.terminal-credit-broadcast]
  conflicts_with: []

- id: train.outcome-gated-process-reward
  name: 结果门控的过程奖励
  type: training-scheme
  description: 过程分只在最终结果正确（positive-only）时发放——防过程分被堆要素刷分（reward hacking 的结构解）。（longtracerl）
  aliases: [positive-only process reward, outcome-gated reward]
  distinct_from: [train.entity-level-process-reward]
  conflicts_with: []

- id: data.trajectory-mined-hard-distractor
  name: 轨迹挖掘难负例
  type: mechanism-family
  description: 从 agent 自身轨迹分层挖掘难度严格递增的干扰项/负例，替代随机负例的数据工厂。（longtracerl）
  aliases: [traj-tiered distractors, trajectory-mined negatives]
  distinct_from: []
  conflicts_with: []

- id: train.trust-region-supervision-gating
  name: 信任区监督门控
  type: training-scheme
  description: 逐 token 按可信度（如投机解码接受率）门控监督强度，离群区温和回退——分区可靠度门的训练形态。（tropd）
  aliases: [trust-region gating, per-token supervision trust]
  distinct_from: [train.terminal-credit-broadcast, train.outcome-gated-process-reward]
  conflicts_with: []

- id: quant.dual-axis-variance-normalization
  name: 双轴方差归一化量化
  type: mechanism-family
  description: KV cache 量化前先做（Hadamard 去相干 +）按双轴方差归一化，再低位 RTN——治离群值主导误差。（kvarn）
  aliases: [VarN, variance normalization quantization]
  distinct_from: []
  conflicts_with: []

- id: quant.pseudo-decode-protocol
  name: 伪解码评测协议
  type: eval-dimension
  description: 量化评测时模拟真实 decode 的逐步误差累积（而非一次性 prefill 打分），还原部署条件。（kvarn）
  aliases: [pseudo-decode evaluation]
  distinct_from: []
  conflicts_with: []

- id: skill.weight-space-skill
  name: 权重空间技能
  type: mechanism-family
  description: 把 agent 的文本技能/经验编译进 LoRA 等参数增量，调用=加载权重而非塞 prompt。（latentskill/scaling 同族）
  aliases: [weight-space skill, LoRA skill]
  distinct_from: [mem.local-verbatim-log, mem.external-vector-store]
  conflicts_with: []

- id: skill.hypernetwork-lora-compiler
  name: 超网络技能编译器
  type: mechanism-family
  description: 用 hypernetwork 把文本技能描述直接编译成 LoRA 参数（免每技能单独训练）。（latentskill）
  aliases: [skill compiler]
  distinct_from: [skill.weight-space-skill]
  conflicts_with: []

- id: skill.component-level-lora-arithmetic
  name: 组件级 LoRA 算术
  type: mechanism-family
  description: 在组件粒度对 LoRA 做加减组合实现技能合成/移除，而非整 adapter 互斥切换。（latentskill）
  aliases: [LoRA arithmetic, skill composition]
  distinct_from: []
  conflicts_with: []

- id: skill.parametric-local-state
  name: 参数化本地适应状态
  type: mechanism-family
  description: 把个人/局部适应状态存进每用户 PEFT 参数（而非外部记忆库）——「百万个人模型」路线的承重概念。（scaling）
  aliases: [per-user adapter, parametric personalization]
  distinct_from: [mem.external-vector-store, mem.local-verbatim-log]
  conflicts_with: []

- id: skill.lora-as-memory-capacity
  name: LoRA 记忆容量律
  type: eval-dimension
  description: 把事实塞进低秩参数的容量极限与崩塌行为——参数化记忆路线的边界测量。（scaling）
  aliases: [LoRA memory capacity]
  distinct_from: []
  conflicts_with: []

- id: skill.adapter-population-governance
  name: adapter 群体治理
  type: mechanism-family
  description: 大规模 adapter 群体的生命周期治理（写入策略/修订/退役），与 mem.lifecycle-management 同问题不同介质。（scaling）
  aliases: [MinT governance, adapter lifecycle]
  distinct_from: [mem.fixed-rule-hooks]
  conflicts_with: []
