relevance_level: "project_pattern"
audience: "ai_only"
core_pattern: >

  稳定 ID 包装层: 把高速 positional index 留在内层，外层维护 `slot_to_id` 和 `id_to_slot`，删除时同步 swap-remove 后的 moved
  id。 候选集先解析、内核只接 bitset: 把 SQL/BM25/ACL/time-window 等复杂条件在外部解析成 ID allowlist，核心向量内核只处理 packed
  bitset。 首次 add 锁定维度: 允许 `dim=None` 的 lazy constructor，首次 `add`/`add_with_ids` 从输入 shape 锁定 dim。
  二进制索引 + JSON side-car: 向量索引用 `.tvim`，文档文本、metadata、string-id map 用 `docstore.json` 或
  `{stem}.nodes.json`。 文档化的“不支持”: 对 MMR、full-precision embedding recovery、非默认 LlamaIndex query
  mode 等不可实现能力直接 raise `NotImplementedError`。
