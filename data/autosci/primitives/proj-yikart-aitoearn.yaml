primitive_id: "proj-yikart-aitoearn"
source_project: "yikart/AiToEarn"
source_url: "https://github.com/yikart/AiToEarn"
title: "yikart/AiToEarn reusable architecture pattern"
relevance_level: "project_pattern"
audience: "ai_only"
core_pattern: >

  NestJS MCP Tool Decorator: 用 `@Tool({ name, description, parameters })` 把业务 service 方法注册为 MCP
  tool；`McpRegistryService` 在 bootstrap 扫描 provider/controller 方法元数据。 Draft-first Agent Workflow:
  生成内容后不直接结束，而是固定走 `getDraftGroupInfoByName → createDraft → action: navigateToDraft`，把 AI
  产物落到产品对象里。 Action-based UI Handoff: Agent 最终用结构化 `result` 返回
  `none`、`navigateToDraft`、`navigateToMedia`、`createChannel`、`updateChannel`、`navigateToPublish` 等
  action。 Platform Restriction Map: 把各平台发布限制集中在 `PublishRestrictionsPrompt`，例如 Twitter `Desc
  required ≤280; Images≤4, ≤5MB, ≤8192px.`，TikTok `Topics≤5; Desc≤2200; Video 3-600s, ≤1GB,
  ≥360px; Images≤10, ≤20MB, 1080x1920.` Relay OAuth For Self-hosting: 自部署时通过
  `RELAY_SERVER_URL`、`RELAY_API_KEY`、`RELAY_CALLBACK_URL` 借用官方 OAuth 凭据，避免每个平台单独申请
  client_id/secret。
