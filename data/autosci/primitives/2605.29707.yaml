primitive_id: decouple-expensive-parallel-cheap-serial
source_paper: "2605.29707"
title: "Domino: Decoupling Causal Modeling from Autoregressive Drafting in Speculative Decoding"
relevance_level: indirect                   # 推理提速对 AutoSci 是降本杠杆，非可直接复用的模块
audience: ai_only
core_pattern: >
  成本结构拆分:把昂贵算子并行摊掉只算一次,只让便宜的小分支承担串行依赖。
  Domino 用并行 backbone 出整块草稿(贵的 LM-head 并行一次)+ 低秩残差头(便宜)按 token 串行补因果。
problem_class: latency-cost-tradeoff-in-iterative-generation
components:
  - parallel_backbone      # 一次出整块,贵算子并行
  - lightweight_correction # 低秩/小头,只它串行
autosci_modules:
  - inference_cost_layer   # AutoSci 跑大量 LLM 调用 → 推测解码降本提速
notes_for_autosci: >
  这不是 AutoSci 的"思考/记忆/进化"模块,而是底层推理加速。价值=AutoSci 大规模自跑实验时
  用推测解码(EAGLE/DFlash/Domino 之类)把每次 LLM 调用提速 2-8×、降 token 成本。
  可迁移的"思维原语"是:**贵的并行算一次,便宜的才串行** —— 任何延迟敏感的多步流程都可借鉴。
inputs:
  - target_model
  - draft_head
outputs:
  - faster_cheaper_inference
implementation_idea: >
  AutoSci 不必自己实现 Domino;在 serving 层(SGLang/vLLM)接现成推测解码即可。
  若要自研收益,先用现成方案做评测(加速×接受长度×TPS),再决定是否训练定制 draft head。
small_experiment: >
  在固定硬件上对 AutoSci 用的基座模型跑 有/无 推测解码 的吞吐与延迟对比,量端到端成本下降。1-3 天。
risks:
  - inference_only         # 不降训练成本
  - framework_lockin       # 主要适配 SGLang,跨框架兼容未知
  - hardware_variance      # 加速随硬件波动,需平台调优
  - not_a_reasoning_gain   # 只提速,不提升 AutoSci 的判断/进化能力
status: extracted
