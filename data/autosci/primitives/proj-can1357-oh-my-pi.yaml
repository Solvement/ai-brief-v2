audience: "ai_only"
core_pattern: >

  Hashline anchored edits: 把 read 输出设计成带 snapshot tag 的可编辑视图，例如 `¶a.ts#0A3B` + `replace
  1..1:`；patcher 在写入前验证 full-file hash，multi-section patch 先 preflight，避免部分落盘。 Preview-first
  structural rewrite: `ast_edit` 固定先 dry-run，显示 per-file replacements，排队一个 `resolve` action；apply
  时重新计算并比较 replacement totals/per-file counts，stale preview 报错。 Internal URL filesystem: 让 `read`
  统一处理 `agent://`、`artifact://`、`issue://`、`pr://`、`rule://`、`skill://`、`memory://` 等资源；子代理 JSON
  输出还能用 `agent://<id>/<path>` 抽字段。 TTSR stream interruption: 规则文件用 frontmatter 写
  `condition`、`scope`、`interruptMode`，匹配 stream delta 后可 abort、注入
  `<system-interrupt>`、继续生成；工具源非中断匹配则把 `<system-reminder>` prepend 到 tool result。 Subagent
  artifact protocol: 每个子代理必须通过隐藏 `yield` 工具结束，输出写 `<id>.md`，父代理用 `agent://<id>` 读取；缺失 yield 最多发 3
  次 reminder。
