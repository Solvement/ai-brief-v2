implementation_idea: >

  Rebuild the agent-infra pattern from fathah/hermes-desktop as a small AutoSci module: extract
  the control flow, define typed inputs/outputs, run it on one synthetic research task, and log
  traces plus validation results. Reference flow: The reusable architecture is a desktop client
  that mediates agent actions through visible tool controls, SSE trace rendering, and local
  conversation state before requests reach the Hermes Agent backend.
small_experiment: >

  Compare baseline free-form execution against the extracted agent-infra pattern from
  fathah/hermes-desktop on three AutoSci tasks. Measure completion rate, trace inspectability,
  failure recovery, and cost over 1-3 days.
design_principles:
  - id: "agent-infra-boundary-as-module"
    principle: "desktop agent control surface: Copy the visible tool toggles, streaming trace renderer, and local session store."
    transfers_to: "Transfer the visible control surface and typed adapter boundary; do not transfer Hermes-specific integrations."
  - id: "agent-infra-observable-flow"
    principle: "The reusable architecture is a desktop client that mediates agent actions through visible tool controls, SSE trace rendering, and local conversation state before requests reach the Hermes Agent backend."
    transfers_to: "Use the flow as an inspectable experiment harness with logs, checkpoints, and failure reports."
  - id: "agent-infra-risk-first-transfer"
    principle: "Transfer the architecture together with its main failure boundary: Hermes Agent API: If the backend API changes, chat streaming and tool toggles can break.."
    transfers_to: "Require an explicit dependency and over-transfer risk review before promoting the pattern into AutoSci."
risks:
  - "Hermes Agent API: If the backend API changes, chat streaming and tool toggles can break."
  - "upstream_api_drift"
  - "over_transfer"
