title: "refactoringhq/tolaria reusable architecture pattern"
relevance_level: "project_pattern"
audience: "ai_only"
core_pattern: >

  VaultEntry 作为文件图谱投影: 把 Markdown 文件解析成统一
  entry：path、title、type、relationships、outgoingLinks、fileKind、workspace provenance。 持久外部 MCP 配置不写
  vault path: 外部 config 只保留 stdio command、index.js、`WS_UI_PORT=9711`；active vault 在工具调用时解析。
  Adapter-specific permission mapping: UI 只暴露 Safe/Power User，底层按 Claude/Codex/OpenCode/Gemini 各自
  CLI 参数映射。 Git-backed disposable cache: cache 存在 `~/.laputa/cache/<vault-hash>.json`，按
  HEAD、diff、uncommitted files 增量刷新；cache version 变更强制重扫。 直接模型只给窄工具: OpenAI-compatible 模型只有 active
  vault 存在时才拿到 `create_note` 工具，且 unsupported tool 会先拒绝。
