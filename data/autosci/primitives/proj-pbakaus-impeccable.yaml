title: "pbakaus/impeccable reusable architecture pattern"
relevance_level: "project_pattern"
audience: "ai_only"
core_pattern: >

  单 skill 多子命令路由: 用一个 `SKILL.src.md` 承载入口、setup、routing rules，再把具体动作放到
  `reference/<command>.md`；命令列表由 `command-metadata.json` 维护。 provider transformer: 保留一个 canonical
  skill source，构建时按 provider 写不同目录、frontmatter、placeholder 和 subagent 格式。 规则 registry + skill rule
  markers: detector registry 用 `id/category/name/description/skillGuideline` 定义规则；skill 文本里有 `<!--
  rule:... -->` 标记，把教学条款和机器扫描条款连起来。 live session journal: live mode 用
  `live-status.mjs`、`live-resume.mjs`、`live-complete.mjs` 和 `.impeccable/live/sessions/` 处理中断恢复。
