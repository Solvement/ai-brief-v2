audience: "ai_only"
core_pattern: >

  Compress-Cache-Retrieve marker: 把压缩输出写成可读 marker，例如文档中的 `[1000 items compressed to 20. Retrieve
  more: hash=abc123]`，同时把原文存到本地 store，用 MCP/工具调用按 hash 取回。 ContentRouter safety gates: 先判
  role、长度、content type、近期窗口、analysis intent，再决定是否压缩；默认跳过 user/system/developer、近期代码、已有 retrieval
  marker 和小内容。 Proxy-first SDK: 让 TS SDK 只做格式转换和 HTTP 调用，把压缩算法集中在本地 Python/Rust proxy；默认
  `HEADROOM_BASE_URL` / `http://localhost:8787`。 Agent failure learning marker block: `headroom
  learn` 把失败路径和成功修正写入 `CLAUDE.md` / `MEMORY.md`，并用 `<!-- headroom:learn:start -->` 到 `<!--
  headroom:learn:end -->` 管理自动生成区。
