primitive_id: reliability-partitioned-supervision
source_paper: "2606.01249"
title: "TrOPD: 逐 token 可靠度分区 + 离群区温和回退"
relevance_level: direct
audience: ai_only
core_pattern: >
  当强老师/强裁判在弱学生自己生成的轨迹上逐步给监督时,分布错位会让少数步骤产生极端或误导信号。
  TrOPD 的可复用模式是:先按每个 token/step 的可靠度自适应分区,而不是用全局阈值一刀切;
  可靠区使用高效主目标继续学习,不可靠的 outlier 区切换到更温和、从老师视角出发的 fallback 信号;
  冷启动阶段允许老师给高质量前缀,再用退火逐步撤掉,最终回到学生自己的 on-policy 分布。
problem_class: unreliable-stepwise-supervision-under-teacher-student-distribution-mismatch
components:
  - acceptance_ratio_partitioner
  - trust_region_reverse_kl
  - outlier_topk_forward_kl_fallback
  - prefix_guided_curriculum
  - stability_telemetry
autosci_modules:
  - self_evolve_controller
  - cold_critic
  - guard
  - typed_memory
inputs:
  - teacher_or_judge_logprobs
  - student_self_generated_tokens
  - stepwise_distribution_ratio
  - optional_teacher_prefix
outputs:
  - partitioned_supervision
  - trust_outlier_masks
  - stability_signals
  - distilled_policy_update
implementation_idea: >
  先做一个 100-300 行的通用分区器:输入 teacher/student logprob,计算 P_trust=min(exp(logp_T-logp_S),1),
  采样或阈值化得到 trust/outlier mask。trust 区走原主目标;outlier 区用老师 top-k 分布构造 forward-KL fallback;
  训练日志记录 grad-norm、policy-entropy、trust ratio、outlier ratio。对 agent 自进化时,把 token 换成 step/claim:
  高信任步骤进入训练样本,低信任步骤只给温和修正或要求老师示范前缀。
small_experiment: >
  在一对小开源师生模型上做迷你数学蒸馏,对比 A=vanilla OPD, B=固定阈值 clipping,
  C=acceptance-ratio trust region + outlier top-k FKL。即使只跑几十到几百步,也记录 grad-norm/entropy/accuracy 曲线。
  第二个实验把同样分区思想迁到 agent judge:对同一批轨迹,比较统一打分 vs 低信任 step 降权/回退后的自训练样本质量。
design_principles:
  - id: partition-by-reliability-before-learning
    principle: "强监督进入训练前先按可靠度分区;不要假设老师对学生自生成的每一步都同样可信。"
    transfers_to: "AutoSci 自进化、agent critic、RAG claim verifier、小模型蒸馏。"
  - id: adaptive-ratio-beats-global-threshold
    principle: "优先用样本自身信号(如 min(p_teacher/p_student,1))确定信任度,少依赖固定全局阈值。"
    transfers_to: "减少手调超参,让不同任务/难度下的监督强度自适应。"
  - id: gentle-fallback-beats-hard-drop
    principle: "低信任样本不一定全丢;用更温和、不会放大坏梯度的 fallback 保留可用信息。"
    transfers_to: "低置信 claim 改要求补证据/老师示范,而不是直接删除或强惩罚。"
  - id: support-then-release-curriculum
    principle: "冷启动阶段给老师前缀/脚手架,再逐步退火撤掉,最终回到目标 on-policy 分布。"
    transfers_to: "难任务自进化、工具使用训练、长链推理训练。"
risks:
  - code_not_released
  - models_not_released
  - teacher_distribution_may_be_unreliable
  - hyperparameter_sensitivity_underexplored
  - controlled_benchmark_no_deployment
  - student_ceiling_remains_below_teacher
