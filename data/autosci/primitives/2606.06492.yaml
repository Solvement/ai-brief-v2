primitive_id: repo-conditioned-versioned-lora-memory
source_paper: "2606.06492"
title: "Code2LoRA: Hypernetwork-Generated Repository Adapters under Software Evolution"
relevance_level: direct_pattern_strong
audience: ai_only
core_pattern: >
  把 repository context 从 per-query retrieved tokens 改造成 versioned parameter memory:
  先用 frozen code embedder 把 non-test source snapshot 压成 repo embedding,再用 hypernetwork
  生成 repo-specific LoRA adapter;对活跃仓库,用 initial repo embedding 初始化 GRU state,
  再按 chronological commit diffs 更新 hidden state,从当前 state 生成 commit-indexed LoRA。
  关键不是“LoRA 本身”,而是 repo_id + commit_sha 绑定的 adapter state,让仓库知识以可缓存、
  可失效、可验证的参数先验参与 coding agent 推理。
problem_class: repository-aware-code-agent-needs-low-token-overhead-and-versioned-memory
components:
  - frozen_repository_encoder
  - repo_embedding_pooler
  - hypernetwork_lora_generator
  - static_snapshot_adapter
  - recurrent_diff_state_gru
  - commit_indexed_adapter_cache
  - execution_verifier
autosci_modules:
  - typed_memory
  - self_evolve_controller
  - tool_orchestrator
  - guard
inputs:
  - repository_snapshot_non_test_source
  - commit_diff_stream
  - repo_id
  - commit_sha
  - target_backbone_projection_schema
  - downstream_code_task_prefix
outputs:
  - repo_specific_lora_adapter
  - commit_specific_adapter_state
  - adapter_version_metadata
  - assertion_or_code_completion
  - verifier_trace
implementation_idea: >
  不先复现论文约 720M/745M 参数 hypernetwork。先做小型版本:
  从 20-50 个 permissively licensed Python repos 抽 pytest/unittest assertion completion,
  建 CR/IR/temporal split。实现 A=RAG@k,B=dependency-resolved context,C=shared LoRA,
  D=repo-conditioned lightweight adapter/router。repo state 绑定 repo_id+commit_sha,
  每个 commit 更新 diff embedding cache。输出后跑 pytest/ruff/mypy,记录 EM、execution pass、
  latency、extra tokens、adapter storage 与 stale-after-commit 下降。
small_experiment: >
  Mini RepoPeftBench:静态 track 用 last snapshot;演化 track 每个修改 assertion 的 commit
  生成 prefix-target pair,每 commit cap <=8 tasks。比较 Static state vs GRU/diff state,
  看 temporal CR EM 是否因 diff state 提升。额外做 DRC coverage 分层:imports 可解析 vs 不可解析,
  检查 RAG/DRC 是否只在 coverage 子集有效。
design_principles:
  - id: parameter-memory-over-repeated-context
    principle: "长期 repo conventions 适合进入 adapter 参数;局部证据仍可由 RAG 查,但不要每次把整个仓库当 token 塞进 prompt。"
    transfers_to: "企业代码助手 / FDE 客户 repo onboarding / coding agent memory layer。"
  - id: versioned-adapter-state
    principle: "repo adapter 必须绑定 repo_id + commit_sha + embedding_hash;否则只是把 stale context 换成 stale parameters。"
    transfers_to: "PR agent / CI bot / 自动测试生成 / 长期运行 copilot。"
  - id: split-stable-and-evolving-context
    principle: "稳定 snapshot knowledge 与 commit diff knowledge 分开建模;活跃软件系统需要 incremental refresh policy。"
    transfers_to: "self-evolving code agents / repo migration agents。"
  - id: adapter-is-prior-not-proof
    principle: "生成的 LoRA 提供 repo-specific prior,不证明输出正确;必须接 execution/static-analysis/license verifier。"
    transfers_to: "AutoSci code generation guard / production coding assistant safety。"
  - id: evaluate-quality-cost-together
    principle: "报告 EM/EditSim/CodeBLEU 之外,必须同时报告 extra tokens、latency、adapter storage、训练/刷新成本。"
    transfers_to: "agent eval dashboards / model routing decisions。"
evidence_hooks:
  - "Static track: Code2LoRA-Static 63.8% CR EM / 66.2% IR EM; strongest baseline FFT+RAG 53.9% CR EM."
  - "Evolution track: Code2LoRA-Evo 60.3% CR EM / 64.5% IR EM; Single LoRA 55.1% / 61.3%."
  - "OOD: Code2LoRA-Evo 74.1% EM, but target-length artifact inflates absolute EM; within-OOD margin about +1.8 pp."
  - "Efficiency: RAG ~1,500 extra tokens/query; DRC ~500-2,000; Code2LoRA variants 0 extra tokens but 679 MB / 65 MB shared storage."
risks:
  - source_repo_unavailable_for_audit
  - hf_artifacts_unavailable_for_audit
  - narrow_python_assertion_completion_scope
  - exact_match_misses_functional_equivalence
  - hypernetwork_parameter_count_large
  - stale_adapter_without_commit_versioning
  - private_repo_attribution_and_license_risk
  - adapter_prior_can_emit_insecure_or_wrong_code
status: extracted
