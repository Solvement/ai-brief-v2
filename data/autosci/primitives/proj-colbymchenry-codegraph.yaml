implementation_idea: >

  Rebuild the agent-infra pattern from colbymchenry/codegraph as a small AutoSci module: extract
  the control flow, define typed inputs/outputs, run it on one synthetic research task, and log
  traces plus validation results. Reference flow: ```mermaid flowchart TD A[йЎ№зӣ®жәҗз Ғ] --> B[жү«жҸҸиҝҮж»Ө] B
  --> C[TreeSitterи§Јжһҗ] C --> D[жңӘи§Јжһҗеј•з”Ё] D --> E[жЎҶжһ¶е’ҢеҜје…Ҙи§Јжһҗ] E --> F[SQLiteеӣҫ] F --> G[MCPе·Ҙе…·] G -->
  H[Agentеӣһзӯ”жҲ–зј–иҫ‘] A --> I[ж–Үд»¶еҸҳжӣҙ] I --> J[WatcherеҗҢжӯҘ] J --> F J --> K[StaleжҸҗзӨә] K --> H ```
  зңҹе®һжөҒпјҡ`__tests__/integration/full-pipeline.test.ts` з”ҹжҲҗзәҰ 120 дёӘ TS жЁЎеқ—пјҢ`indexAll()` еҗҺжҗңзҙў `entry` е’Ң
  `fn50`пјҢеҶҚз”Ё `getCallers(fn0)`гҖҒ`buildContext("entry function chain")` йӘҢиҜҒеӣҫиғҪиў«жҹҘиҜўпјӣйҡҸеҗҺ `sync()` еӨ„зҗҶдёүзұ»еҸҳжӣҙпјҡж–°еўһ
  `src/consumer.ts`гҖҒдҝ®ж”№ `src/mod0.ts` еҠ  `newHelper`гҖҒеҲ йҷӨ `src/mod1.ts`гҖӮпјҲжқҘжәҗпјҡ__tests__/integratio
small_experiment: >

  Compare baseline free-form execution against the extracted agent-infra pattern from
  colbymchenry/codegraph on three AutoSci tasks. Measure completion rate, trace inspectability,
  failure recovery, and cost over 1-3 days.
design_principles:
  - id: "agent-infra-boundary-as-module"
    principle: "MCP initialize е·Ҙе…·зәӘеҫӢ: жҠҠе·Ҙе…·йҖүжӢ©и§„еҲҷж”ҫеҲ° MCP server зҡ„ initialize жҢҮд»ӨйҮҢпјҢдҫӢеҰӮвҖңз»“жһ„й—®йўҳе…Ҳз”Ё exploreпјҢиҜ»ж–Үд»¶з”Ё node file жЁЎејҸвҖқгҖӮ Staleness banner: зҙўеј•е»¶иҝҹдёҚеҸҜйҒҝе…Қж—¶пјҢдёҚйҳ»еЎһжҹҘиҜўпјҢиҖҢжҳҜеңЁе“Қеә”йЎ¶йғЁж ҮеҮәеҫ…еҗҢжӯҘж–Үд»¶пјҢи®© agent еҸӘ Read йӮЈдәӣж–Үд»¶гҖӮ Agent target registry: жҜҸдёӘе®ўжҲ·з«ҜдёҖдёӘ target жЁЎеқ—пјҢз»ҹдёҖе®һзҺ° detect/install/uninstall/printConfigгҖӮ жң¬ең°еӣҫ schema еҠ  FTS: жҠҠд»Јз ҒеҜ№иұЎжӢҶжҲҗ nodesгҖҒedgesгҖҒfilesгҖҒunresolved_refsпјҢеҶҚз”Ё FTS5 жҹҘ symbol/docstring/signatureгҖӮ Affected tests CLI: з”Ёдҫқиө–еӣҫд»ҺеҸҳжӣҙж–Үд»¶еҸҚжҹҘеҸ—еҪұе“ҚжөӢиҜ•пјҢдҫӢеҰӮ `git diff --name-only | codegraph affected --stdin --quiet`гҖӮ"
    transfers_to: "Extract the reusable agent-infra boundary from colbymchenry/codegraph into a typed AutoSci module."
  - id: "agent-infra-observable-flow"
    principle: "```mermaid flowchart TD A[йЎ№зӣ®жәҗз Ғ] --> B[жү«жҸҸиҝҮж»Ө] B --> C[TreeSitterи§Јжһҗ] C --> D[жңӘи§Јжһҗеј•з”Ё] D --> E[жЎҶжһ¶е’ҢеҜје…Ҙи§Јжһҗ] E --> F[SQLiteеӣҫ] F --> G[MCPе·Ҙе…·] G --> H[Agentеӣһзӯ”жҲ–зј–иҫ‘] A --> I[ж–Үд»¶еҸҳжӣҙ] I --> J[WatcherеҗҢжӯҘ] J --> F J --> K[StaleжҸҗзӨә] K --> H ``` зңҹе®һжөҒпјҡ`__tests__/integration/full-pipeline.test.ts` з”ҹжҲҗзәҰ 120 дёӘ TS жЁЎеқ—пјҢ`indexAll()` еҗҺжҗңзҙў `entry` е’Ң `fn50`пјҢеҶҚз”Ё `getCallers(fn0)`гҖҒ`buildContext(\"entry function chain\")` йӘҢиҜҒеӣҫиғҪиў«жҹҘиҜўпјӣйҡҸеҗҺ `sync()` еӨ„зҗҶдёүзұ»еҸҳжӣҙпјҡж–°еўһ `src/consumer.ts`гҖҒдҝ®ж”№ `src/mod0.ts` еҠ  `newHelper`гҖҒеҲ йҷӨ `src/mod1.ts`гҖӮпјҲжқҘжәҗпјҡ__tests__/integration/full-pipeline.test.tsпјү жңҖе°ҸдҪҝз”Ёи·Ҝеҫ„жҳҜпјҡ ```bash codegraph init -i codegraph serve --mcp ``` з¬¬дёҖиЎҢе»ә `.codegraph/codegraph.db`пјҢз¬¬дәҢиЎҢжҠҠ MCP е·Ҙе…·жҡҙйңІз»ҷ agentпјӣinstaller еҶҷе…Ҙзҡ„е®һйҷ…е‘Ҫд»Өд№ҹжҳҜ `codegraph` + `serve --mcp`гҖӮпјҲжқҘжәҗпјҡREADME CLI Referenceпјӣsrc/installer/targets/shared.tsпјү"
    transfers_to: "Use the flow as an inspectable experiment harness with logs, checkpoints, and failure reports."
  - id: "agent-infra-risk-first-transfer"
    principle: "Transfer the architecture together with its main failure boundary: Node bundled runtime / node:sqlite: Node зҡ„ `node:sqlite` д»ҚдјҡжҸҗзӨә experimentalпјӣNode 25 иҝҳиў« CLI зЎ¬жӢҰпјҢжәҗз ҒйҮҢйңҖиҰҒ `CODEGRAPH_ALLOW_UNSAFE_NODE` жүҚиғҪз»•иҝҮгҖӮ."
    transfers_to: "Require an explicit dependency and over-transfer risk review before promoting the pattern into AutoSci."
risks:
  - "Node bundled runtime / node:sqlite: Node зҡ„ `node:sqlite` д»ҚдјҡжҸҗзӨә experimentalпјӣNode 25 иҝҳиў« CLI зЎ¬жӢҰпјҢжәҗз ҒйҮҢйңҖиҰҒ `CODEGRAPH_ALLOW_UNSAFE_NODE` жүҚиғҪз»•иҝҮгҖӮ"
  - "ж–Үд»¶зі»з»ҹ watcher: fs.watch еңЁ WSL2 `/mnt`гҖҒWindowsгҖҒLinux inotifyгҖҒmacOS FSEvents иЎҢдёәдёҚеҗҢпјҢеҸҜиғҪеҪұе“ҚиҮӘеҠЁеҗҢжӯҘгҖӮ"
  - "Agent е®ўжҲ·з«Ҝй…ҚзҪ®ж јејҸ: Claude/Cursor/Codex/Gemini зӯүй…ҚзҪ®и·Ҝеҫ„жҲ–еӯ—ж®өеҸҳжӣҙпјҢдјҡи®© installer еӨұж•ҲгҖӮ"
  - "GitHub Releases / npm еҲҶеҸ‘: release archiveгҖҒoptional package жҲ– GitHub API/redirect еӨұиҙҘдјҡеҪұе“Қе®үиЈ…гҖӮ"
  - "npm dependencies: дҫқиө–е®үе…ЁжјҸжҙһеҸҜиғҪеҪұе“Қ CLI/MCP иҝҗиЎҢйқўгҖӮ"
  - "Claude Opus benchmark зҺҜеўғ: жЁЎеһӢгҖҒpromptгҖҒagent е·Ҙе…·зӯ–з•ҘеҸҳеҢ–дјҡж”№еҸҳ README зҡ„жҲҗжң¬/йҖҹеәҰз»“и®әгҖӮ"
  - "over_transfer"
