primitive_id: "proj-colbymchenry-codegraph"
source_project: "colbymchenry/codegraph"
source_url: "https://github.com/colbymchenry/codegraph"
title: "colbymchenry/codegraph reusable architecture pattern"
relevance_level: "project_pattern"
audience: "ai_only"
core_pattern: >

  MCP initialize instructions as single source of truth: 把工具使用策略放到 MCP `initialize` 响应里，而不是到处写
  `CLAUDE.md`、`AGENTS.md`。CodeGraph 的 `SERVER_INSTRUCTIONS` 明确写了何时用 `codegraph_explore`、何时用
  `codegraph_search`、何时回退 Read。（来源：src/mcp/server-instructions.ts；src/installer/targets/claude.ts
  issue #529 comments） Local graph schema with unresolved reference staging: 先把未解析引用写进
  `unresolved_refs`，再批量解析并创建 `edges`；schema 里节点、边、文件和 unresolved refs
  分表。（来源：src/db/schema.sql；src/extraction/index.ts storeExtractionResult；src/resolution/index.ts
  resolveAndPersistBatched） Staleness banner instead of silent stale context: 当 watcher debounce
  期间某个响应引用了 pending file，就在响应顶部提示该文件可能 stale，并让代理 Read 指定文件；未引用的 pending file 放
  footer。（来源：src/mcp/tools.ts
  formatStaleBanner/formatStaleFooter；__tests__/mcp-staleness-banner.test.ts） Installer target
  registry: 每个代理作为 `AgentTarget`，集中注册在 `ALL_TARGETS`，支持 `auto`、`all`、`none` 和 CSV
  解析。（来源：src/installer/targets/registry.ts） Adaptive explore output budget:
  `getExploreOutputBudget(fileCount)` 按文件数给 `codegraph_explore` 设置
  `maxOutputChars`、`defaultMaxFiles`、`maxCharsPerFile` 等预算，小仓库和大仓库不同。（来源：src/mcp/tools.ts
  getExploreOutputBudget）
