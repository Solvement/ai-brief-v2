implementation_idea: >

  Rebuild the agent-infra pattern from colbymchenry/codegraph as a small AutoSci module: extract
  the control flow, define typed inputs/outputs, run it on one synthetic research task, and log
  traces plus validation results. Reference flow: 白话：真实路径可以按一个项目初始化来走。用户先装 CLI：README 给出 `curl
  -fsSL .../install.sh | sh`、Windows `irm .../install.ps1 | iex`，或 `npm i -g
  @colbymchenry/codegraph`。然后 `codegraph install` 写入代理 MCP 配置；例如 Codex 目标写 `~/.codex/config.toml`
  的 `[mcp_servers.codegraph]`，Claude 全局写 `~/.claude.json`、本地写 `./.mcp.json`，共同的 server 配置是
  `command: codegraph`、`args: ['serve','--mcp']`。（来源：README Get
  Started；src/installer/targets/codex.ts；src/installer/targets/claude.ts；src/installer/targets/shared.ts）
