title: "NousResearch/hermes-agent reusable architecture pattern"
relevance_level: "project_pattern"
audience: "ai_only"
core_pattern: >

  Programmatic Tool Calling RPC: 把长工具链封装成子进程脚本，通过 stub 调父进程工具；限制工具白名单、调用次数、stdout/stderr 大小。
  SKILL.md procedural memory: 用 `SKILL.md` + references/templates/scripts/assets
  表示可复用流程；`skill_view` 渐进加载，`skill_manage` 支持 create/edit/patch/write_file。 Observer hooks +
  middleware split: 把只读 telemetry hook 和会改写行为的 middleware 分离；hook 负责记录，middleware 负责改写请求或包裹执行。
  Terminal backend abstraction: 把命令执行后端抽象成 `env_type`，支持本机、SSH、Docker、Singularity、Modal、Daytona，并把
  cwd、镜像、资源、持久化、env forward 放进配置。 Cron prompt scanner: 为无人值守任务单独做严格 prompt 扫描；对附加 skill
  内容使用更窄扫描，避免安全文档中的攻击样例误报。
