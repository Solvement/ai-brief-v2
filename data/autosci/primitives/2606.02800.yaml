primitive_id: unified-omnimodal-backbone-mode-by-arrangement
source_paper: "2606.02800"
title: "Cosmos 3: Omnimodal World Models for Physical AI"
relevance_level: indirect                  # 世界模型/多模态基建,非 AutoSci 自进化主线;借其架构与基建模式
audience: ai_only
core_pattern: >
  用「单一底座 + 由 token 排列决定工作模式」统一异构能力:一条序列前段走自回归(理解/语言)、
  后段走扩散(生成),每层双套参数(reasoner/generator 双塔)从预训练模型初始化、层内共享注意力;
  各模态(含 action)用专用 encoder 投影进统一表示空间,异构来源用分域投影、共享主干;
  跨模态按真实物理时间轴对齐位置编码;不改架构、只换输入输出配置即可 post-train 出专用模型。
problem_class: unify-heterogeneous-understanding-and-generation-under-one-backbone-switchable-by-io-config
components:
  - modality_encoders        # 每模态专用 encoder(理解 ViT / 生成 VAE / 音频 VAE / 动作分域投影)→ 统一表示
  - unified_token_layout     # AR 段在前 + 扩散段在后;clean 条件 token 在 noisy 目标前;模式=排列
  - dual_tower_mot           # 每层 reasoner/generator 两套参数,均从预训练 backbone 初始化
  - shared_joint_attention   # AR 因果自注意力;DM 全注意力可读 AR;AR 不被 DM 更新(保因果)
  - absolute_temporal_rope   # 按真实时间而非 token 序号分配位置,对齐不同 FPS/采样率
  - postq_specialization     # 不改架构,小数据 post-train 出专用变体(如 DROID 策略)
  - two_track_data_curriculum # reasoner 配对视觉-语言数据 / generator 重建式大语料,主干共享
autosci_modules:
  - multimodal_world_model    # AutoSci 若需"想象实验后果"的生成式前向模拟,可借此统一底座范式
  - typed_memory              # 结构化 JSON caption schema(预定义字段)= 可检视的类型化标注记忆
  - synthetic_data_engine     # 用世界模型生成下游训练数据(论文核心卖点之一)→ 自造语料
  - eval_harness              # 解耦的"生成→打分"评测基建 + 自动指标/人评/LLM-judge 取舍
  - cold_critic               # 警示:大量 LLM-as-judge + 自家基准 → 评判须独立、防主场偏置
inputs:
  - foundation_weights        # 开源底座权重(Cosmos3-Nano 16B / Super 65B)
  - small_domain_data         # 目标域小数据(动作/视频/控制信号)
  - io_config                 # 决定工作模式的 token 排列配置
outputs:
  - specialized_model         # post-train 出的专用变体(策略/文生图/图生视频等)
  - synthetic_corpus          # 世界模型生成的下游训练数据
  - eval_records              # 与权重/输入/配置全程可追溯的评测记录
implementation_idea: >
  Mini 版(不训大模型):取一个开源多模态底座,实现"统一 token 排列路由"——同一前向按
  输入形态切换 理解/生成 模式;实现一个分域投影把 2-3 种异构信号(如不同传感器/控制)映射进同一空间;
  跑通"下载权重 → 小数据 post-train → 出专用能力"一条最短链。200-500 行可演示路由+post-train 骨架。
small_experiment: >
  对照"统一底座 post-train vs 从零训专用模型"在同一小任务上的首轮成功率/收敛步数(验证 MT-init 式
  迁移先验是否真省事);再做"世界模型生成合成数据 → 训下游小模型 vs 真实数据"对照,测合成数据增益。
  另测评判稳健性:同一批生成结果用两个不同 VLM 裁判打分,量化裁判分歧(防 LLM-judge 偏置)。1-21 天。
risks:
  - judge_bias               # 大量 LLM/VLM-as-judge + 自建基准 → 复用须接独立评判,警惕主场分
  - compute_moat             # 训练吃千卡 GB200、最大 64B → 只能复用权重,无法复现训练
  - physics_unsolved         # Physics-IQ 绝对分仅 40-60/100 → 生成视频"守物理"远未解决,别当真值
  - benchmark_snapshot       # "best by Artificial Analysis/RoboArena"是撰稿时快照,会变,非恒定
  - single_platform_action   # 策略仅 DROID 单臂 pilot → 跨本体稳健性未证
  - not_agent_core           # 这是世界模型/多模态主线,非 AutoSci 自进化直接蓝本,定位为基建借鉴
status: extracted
