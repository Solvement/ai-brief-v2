title: "Panniantong/Agent-Reach reusable architecture pattern"
relevance_level: "project_pattern"
audience: "ai_only"
core_pattern: >

  Channel 注册表: 每个平台一个 `Channel` 子类，声明 `name`、`description`、`backends`、`tier`，再集中放入 `ALL_CHANNELS`。
  Doctor 优先于封装 API: `check_all(config)` 收集每个 channel 的 `ok/warn/off/error`，报告按 tier 分组。 Skill
  路由文档: 主 `SKILL.md` 只放路由和短命令，复杂平台放 `references/social.md`、`video.md`、`web.md` 等。 输出清洗器:
  对高噪声平台输出先做字段裁剪，例如小红书只保留正文、作者、互动数、图片 URL 和评论。
