implementation_idea: >
  在 AI-Brief/AutoSci 内部做 Mini-ALE：选 5-10 个已有长程任务（论文深读、代码修复、
  KG facet 蒸馏、冷审复核），每个任务都写成 input/output/reference/evaluate 四目录契约；
  evaluate() 先跑硬门（文件存在、JSON/YAML/MDX 可解析、脚注/数字可回溯、验证脚本绿），
  再算质量分或人工冷审分。保留 public smoke set 给日常回归，private holdout 给模型/agent
  升级评估。每次失败都标 Understanding / Approach / Execution / Infrastructure，
  回写到任务设计和记忆层。

small_experiment: >
  用一个现有深读任务做 3 版评测：A=LLM-as-judge 总体打分；B=deterministic hard gates
  + LLM 质量评语；C=gate-and-score + hidden reference snippets。比较三者的稳定性、
  误杀/漏杀、人工复核时间。预期 3-7 天可完成最小闭环。

design_principles:
  - name: "可验证优先"
    statement: "先把专业任务设计到能被代码或窄证据 probe 判，再让 agent 去做；判不了就不该进入核心 benchmark。"
  - name: "三组件解耦"
    statement: "task specification、agent harness、environment VM 靠接口组合，避免评测被某个 agent 或某台机器写死。"
  - name: "hidden reference 不进 agent 视野"
    statement: "reference 只在评分阶段出现；否则 benchmark 会退化成找答案或反向工程。"
  - name: "门控优先于加权平均"
    statement: "解析失败、文件缺失、安全/结构硬约束失败应直接归零，再谈连续质量分。"
  - name: "失败归因驱动自进化"
    statement: "pass/fail 之后必须标 Understanding/Approach/Execution/Infrastructure，才能决定补领域知识、改规划、修工具还是调环境。"
  - name: "公开题用于学习，私有题用于测量"
    statement: "public smoke set 提供透明回归；private holdout 保持长期可测性，防止针对性过拟合。"

risks:
  - author_self_reported_scores
  - private_pool_not_fully_reproducible
  - deterministic_task_selection_bias
  - model_harness_attribution_confound
  - public_subset_contamination
  - high_task_construction_cost
  - llm_probe_residual_subjectivity

