primitive_id: verifiable-economic-workflow-benchmark
source_paper: "2606.05405"
title: "Agents' Last Exam"
relevance_level: direct
audience: ai_only
core_pattern: >
  把真实专业工作流做成可规模化、可复跑、可自动判卷的 agent benchmark：
  题源来自行业专家已完成项目，经五道 QC 门入库；运行时解耦 task specification、
  agent harness、environment VM；agent 只能看到 input/software 并写 output，
  hidden reference 在评分阶段才注入；评分优先使用 deterministic-first checks，
  常见组合是 gate-and-score（二值前置门失败即 0，通过后再算连续质量分）。
  这给 AutoSci 的直接启发是：任何自进化 agent 任务都应先变成可验收工作流，
  再让 agent 在同一 task/env 接口下横向比较和回写失败。
problem_class: verifiable-long-horizon-agent-evaluation-for-economic-professional-workflows

core_concepts:
  - name: 可验证经济价值任务（verifiable economically-valuable workflow）
    role: primary
    evidence: "long horizon, economically valuable, real world tasks with verifiable outcomes"
  - name: 门控+打分（gate-and-score）
    role: primary
    evidence: "failure on the gate forces the task score to 0"
  - name: 回避 LLM-as-judge（deterministic-first verification）
    role: primary
    evidence: "deliberately avoids LLM-as-judge wherever a deterministic alternative exists"
  - name: 评测三组件解耦（task-spec / agent / environment）
    role: primary
    evidence: "uncoupling of three components (the task specification, the agent, and the environment)"
  - name: GCUA 五功能层（Brain/Eyes/Body/Hands/Feet）
    role: supporting
    evidence: "Brain (LLM reasoning and planning), Eyes (GUI perception via screenshots), Body ... Hands ... Feet"
  - name: 领域知识瓶颈（domain-knowledge failure dominance）
    role: supporting
    evidence: "Understanding and Approach failures together account for roughly three quarters of cases"

