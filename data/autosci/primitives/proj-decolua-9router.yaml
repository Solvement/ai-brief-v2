title: "decolua/9router reusable architecture pattern"
relevance_level: "project_pattern"
audience: "ai_only"
core_pattern: >

  Model string as routing contract: 用 `alias/model` 作为路由键，例如
  `kr/claude-sonnet-4.5`、`cx/gpt-5.5`，并把 alias 映射集中在 `open-sse/services/model.js` 与
  `PROVIDER_ID_TO_ALIAS`。 Combo fallback service: `handleComboChat({ body, models,
  handleSingleModel, comboStrategy, comboStickyLimit })` 这种把 fallback 编排与单模型执行分离的接口。 Per-model
  account lock: 失败后写 `modelLock_${model}`，成功后只清当前模型 lock；避免一个模型限流导致整个账号不可用。 RTK pre-dispatch
  compression: 在格式翻译之后、executor 之前处理 tool output，并支持 OpenAI、Claude、Responses、Kiro 多种 body 形状。
  Driver chain for local persistence: Node 下优先 `better-sqlite3`，再尝试 `node:sqlite`，最后 `sql.js`；Bun
  下先 `bun:sqlite`。
