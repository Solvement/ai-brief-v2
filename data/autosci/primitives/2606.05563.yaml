primitive_id: topic-localized-counterfactual-agent-eval
source_paper: "2606.05563"
title: "SoCRATES: Topic-Localized Evaluation for Proactive LLM Mediation"
relevance_level: direct_pattern_strong
audience: ai_only
core_pattern: >
  把开放式多轮 agent 任务评测拆成“配对反事实 + hard-task gate + topic-localized judge + 多指标归因”：
  先用无 mediator simulation 多次筛出 baseline 不能自然解决的 hard cases；再对每个场景做单轴扰动，
  让失败可归因到具体能力；评估时不在每个 turn 给所有 topic 打分，而是对每个 topic 只定位
  relevant turns 并 carry forward 非相关回合的分数；最后分开报告 intervention timeliness、
  intervention effectiveness 和 consensus gain，避免把过度频繁插话误判成真实贡献。
problem_class: open-ended-multi-turn-agent-evaluation-is-noisy-without-localized-attribution-and-counterfactual-baselines
components:
  - agentic_scenario_curation
  - hard_task_gate
  - socio_cognitive_axis_probe
  - topic_localized_evaluator
  - paired_counterfactual_baseline
  - intervention_metric_decomposition
autosci_modules:
  - evaluator
  - cold_critic
  - guard
  - self_evolve_controller
  - typed_memory
inputs:
  - public_conflict_seed_or_open_task_seed
  - structured_scenario_with_topics_parties_preferences
  - baseline_no_agent_trajectory
  - mediated_or_agent_trajectory
  - topic_or_claim_schema
outputs:
  - relevant_turns_per_topic
  - consensus_score_trajectory
  - intervention_timeliness
  - intervention_effectiveness
  - counterfactual_consensus_gain
implementation_idea: >
  在 AI-Brief 冷审门上做 mini-SoCRATES：把一篇深读拆成 topic/claim 列表，先跑无结构 bare reviewer
  作为 baseline，再跑 topic-localized reviewer。每个 claim 只在其被提出、被复用、被数字化的位置查原文 support，
  非相关段落 carry forward；输出 claim-level support trajectory、first unsupported reuse、
  和最终修改收益。对比 bare reviewer 的漏报/误报，验证 localized judging 是否提升忠实度与可教性。
small_experiment: >
  选 20 篇已有 deepread，其中混入 5 类已知错误：数字错、表格错、仓库状态错、方法归属错、过度外推。
  对照 A=整篇丢给 LLM 审，B=claim-localized 审，C=claim-localized + 反事实 hard-case gate。
  指标：error recall、false positive、定位到段落的准确率、修订后 validate/audit 通过率。1-5 天。
core_concepts:
  - name: "增量多轮评测协议"
    role: primary
    evidence: "scores agreement only at the turns that actively move it and carries scores forward otherwise"
  - name: "结构化产物代替对话"
    role: primary
    evidence: "recasts each retrieved case into a structured scenario"
  - name: "冲突消解"
    role: primary
    evidence: "evaluating proactive LLM mediators in realistic, multi-domain testbeds"
  - name: "可执行反馈（executable feedback）"
    role: supporting
    evidence: "three complementary metrics: consensus gain, intervention timeliness, and intervention effectiveness"
  - name: "角色专精（role specialization）"
    role: mentioned
    evidence: "Disputing Parties... Mediator... Evaluator"
discovery_trace:
  hypothesis: "数据不足"
  failed_attempts: "原文没有逐步叙述 SoCRATES 解法如何从失败尝试中被发现；它给出的是三项现有评测挑战与对应设计，不是实验探索路径。"
  source_span: "paper.mdx#技术细节(选读)"
design_principles:
  - id: localize-judge-updates-to-relevant-turns
    principle: "开放式多议题任务里，judge 只应在相关 turn 更新对应 topic/claim，非相关内容 carry forward，避免 off-topic noise 累积。"
    transfers_to: "论文深读冷审、RAG claim verification、多工具 agent 轨迹评分。"
  - id: pair-with-counterfactual-baseline
    principle: "评 agent 增益必须有同场景无 agent baseline，否则无法区分模型贡献和任务本身容易。"
    transfers_to: "自进化 agent eval、客服/销售/研究 agent A/B、guardrail 成效评估。"
  - id: filter-for-hard-cases-before-ranking
    principle: "先筛 baseline 多次失败的 hard cases，再做 leaderboard，防止容易题制造假进步。"
    transfers_to: "每日深读冷审 stress set、agent regression suite、benchmark curation。"
  - id: decompose-intervention-quality
    principle: "把“何时介入”和“介入是否有效”拆开；高频早插话不等于高贡献。"
    transfers_to: "proactive agent、copilot nudges、notification/assistant timing。"
  - id: profile-capabilities-with-single-axis-probes
    principle: "每次只扰动一个社会/任务轴，输出能力 profile，而不是把多个压力混在一个平均分里。"
    transfers_to: "agent robustness testing、用户画像/情绪/上下文长度/工具噪声分轴 eval。"
risks:
  - code_and_data_not_released
  - all_llm_simulation_not_human_field_trial
  - english_only_cultural_axis
  - consensus_metric_omits_satisfaction_fairness_trust_repair
  - evaluator_backbone_sensitivity_for_timeliness
  - annotators_not_professional_mediators
status: extracted
