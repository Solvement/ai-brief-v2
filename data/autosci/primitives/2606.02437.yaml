primitive_id: peft-as-persistent-personal-state
source_paper: "2606.02437"
title: "PEFT/LoRA as Persistent Local State for Personal Model Populations"
relevance_level: direct_pattern_strong
audience: ai_only
core_pattern: >
  Reframe PEFT from a cheap fine-tuning substitute into the local writable state layer of a personal-model architecture.
  A small number of strong shared foundation models provide general competence; many lightweight adapters carry persistent
  instance-specific behavioral state such as preferences, skills, tool habits, policy tendencies, and selected memory-like updates.
  Raw facts, documents, calendars, and databases should remain in external memory/tools; adapter parameters should mainly store
  repeated behavioral consequences. Scaling requires three coupled axes: Scale Up makes the shared prior strong enough for small
  updates to matter; Scale Down makes each local state small, stable, and reusable; Scale Out manages many persistent adapter
  identities as a population that can be served, evaluated, rolled back, routed, voted, or distilled.
problem_class: population-scale-persistent-personalization-over-shared-foundation-models
components:
  - shared_strong_prior
  - local_peft_state
  - memory_layer_router
  - context_learning_write_policy
  - adapter_revision_lifecycle
  - bounded_residency_serving
  - diversity_aggregation
autosci_modules:
  - typed_memory
  - self_evolve_controller
  - self_skill_distiller
  - cold_critic
  - guard
inputs:
  - base_model_identity
  - per_instance_experience_trace
  - external_memory_and_tool_state
  - evaluation_signal
  - adapter_configuration
outputs:
  - persistent_adapter_revision
  - adapter_policy_record
  - memory_layer_decision
  - population_route_or_vote_result
  - rollbackable_personal_state
implementation_idea: >
  Build a small-scale adapter platform rather than trying to reproduce trillion-scale RL. Maintain a registry of adapter policy records:
  base_id, rank, alpha rule, target modules, parent revision, training source, eval score, activation state, and rollback pointer.
  Route memory writes by type: short-term task state stays in context; editable facts stay in retrieval/tools; repeated skills and
  behavioral preferences can be distilled into a LoRA adapter. Add a serving simulator with shared storage, CPU cache, GPU active slots,
  cold-load admission, and two-phase readiness. Train several adapters from the same base with different seeds/data order and compare
  majority voting across distinct adapters against repeated sampling from one adapter.
small_experiment: >
  1) Train small LoRA adapters for a toy personal-assistant task where recurring workflow habits must persist across sessions.
  Compare prompt-only memory, retrieval-only memory, and LoRA behavioral memory. 2) Sweep ranks 1/4/16/32 across multiple seeds and
  report mean vs best-seed score, KL/drift, adapter size, and load latency. 3) Train 8-20 distinct LoRA variants and compare
  collaboration voting vs repetition sampling on a held-out task. 4) Simulate 1000+ adapter revisions with LRU CPU cache and bounded
  GPU slots to measure cold-load and prewarm policies.
design_principles:
  - id: separate-facts-from-behavioral-state
    principle: "Do not overload adapter parameters as a universal memory store. Put editable facts and inspectable external reality in retrieval/tools; put repeated behavioral consequences, skills, preferences, and policy tendencies in PEFT state."
    transfers_to: "Personal agents, AutoSci memory, and long-running research assistants should route each memory write to context, retrieval/tool state, or adapter state based on editability, auditability, and behavioral value."
  - id: adapter-is-a-policy-revision-not-a-file
    principle: "Treat every adapter as a versioned policy object with base compatibility, provenance, evaluation, activation, residency, rollback, and retirement state."
    transfers_to: "Self-evolving agents need model-state lifecycle management; every self-update should create an auditable revision instead of overwriting hidden weights."
  - id: optimize-reliability-not-best-seed
    principle: "Low-rank adapters can show strong best-seed performance while being unreliable in the mean; population systems need seed reliability, KL control, and transferable rank/alpha/lr rules."
    transfers_to: "Auto-tuning and evaluation should report mean, variance, best, and downside risk across seeds before promoting a new adapter recipe."
  - id: addressability-is-not-residency
    principle: "A million-adapter catalog is an addressability claim, not a simultaneous GPU-residency claim. Serving design must separate durable storage, CPU cache, GPU active slots, cold loading, and readiness."
    transfers_to: "Any shared-base personalization platform should expose cache and activation state as first-class SLO variables."
  - id: diversity-is-computable-state
    principle: "Distinct adapters trained from the same base can provide complementary policies; model count can become a measurable scale-out variable through voting, routing, debate, or distillation."
    transfers_to: "AutoSci can maintain multiple specialized self-states or critics and aggregate them instead of chasing one monolithic personal model."
risks:
  - position_paper_not_single_reproducible_system
  - no_code_repository_disclosed
  - closed_author_systems_limit_independent_verification
  - many_results_are_curve_or_headline_not_raw_tables
  - adapter_memory_can_solidify_bad_or_unsafe_behavior
  - memory_capacity_requires_write_policy_not_unbounded_storage
status: extracted
