implementation_idea: >

  Rebuild the devtool pattern from harry0703/MoneyPrinterTurbo as a small AutoSci module: extract
  the control flow, define typed inputs/outputs, run it on one synthetic research task, and log
  traces plus validation results. Reference flow: 真实流程可以从 API 的 `/videos` 看：控制器创建任务 ID，把
  `TaskVideoRequest` 丢给任务管理器，后台线程执行 `app/services/task.py:start`。（来源：app/controllers/v1/video.py
  create_task；app/controllers/manager/base_manager.py） ```mermaid flowchart TD A[用户主题或脚本] -->
