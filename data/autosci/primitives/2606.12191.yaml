primitive_id: agentic-environment-engineering-lifecycle
source_paper: "2606.12191"
title: "Agentic Environment Engineering for Large Language Models: A Survey of Environment Modeling, Synthesis, Evaluation, and Application"
relevance_level: direct
audience: ai_only
core_pattern: >
  把 LLM agent 的“环境”从临时 benchmark / sandbox / world model 升级为可建模、可合成、可评估、
  可演化的工程对象：先用 POMDP 定义状态、动作、转移、奖励和观察；再用 8 组属性与 8 个任务领域定位环境；
  合成侧分 symbolic synthesis 与 neural synthesis；质量门分 correctness、diversity、complexity、fidelity；
  应用侧分 agent evolution 4 路径与 environment evolution 3 范式。对 AutoSci 的直接启发是：
  自进化不能只改 agent 自身，也要把“训练场/评测场”做成会验证、会调难度、会扩分布的环境层。
problem_class: model-synthesize-evaluate-and-evolve-agentic-environments-for-self-improving-agents

core_concepts:
  - name: 环境工程生命周期（modeling-synthesis-evaluation-application）
    role: primary
    evidence: "modeling, synthesis, evaluation and application"
  - name: 符号合成 vs 神经合成（symbolic vs neural environment synthesis）
    role: primary
    evidence: "Symbolic Synthesis ... Neural Synthesis"
  - name: 环境质量四维评估（correctness/diversity/complexity/fidelity）
    role: primary
    evidence: "correctness, diversity, complexity, and fidelity"
  - name: agent↔环境协同进化（agent-environment co-evolution）
    role: primary
    evidence: "agent-environment co-evolution"
  - name: Environment-as-a-Service（EaaS）
    role: supporting
    evidence: "Environment-as-a-Service (EaaS)"
  - name: 自进化 agent
    role: mentioned
    evidence: "continual evolution of model capabilities"

