design_principles:
  - "把环境当一等工程对象：数据集只给样本，环境给动作后果、状态变化和奖励。"
  - "先做 correctness，再谈规模：自动合成环境如果没有 verifier，只是在规模化制造错误反馈。"
  - "diversity、complexity、fidelity 要和 correctness 分开量，否则环境可能能跑但训不出泛化。"
  - "agent 进化和环境进化分账：记忆/编排/轨迹/RL 是 agent 侧；神经/难度/规模是环境侧。"
  - "符号环境提供可控和可复现，神经环境提供覆盖和模拟；生产级系统优先考虑神经-符号混合。"
  - "EaaS 接口应隐藏浏览器、容器、模拟器、设备依赖，让 agent 只看到统一交互协议。"

small_experiment: >
  选一个现有 AutoSci 任务族（如论文深读冷审、代码修复或工具调用），做一个 Mini Environment Lab：
  1) 用 8 组属性填写 environment card；2) 封装 reset/step/observe/reward/verify；
  3) 用规则或代码合成 30-100 个任务并跑 verifier；4) 输出 correctness/diversity/complexity/fidelity 报告；
  5) 用最近 N 次成功率或错误类型做 difficulty-driven curriculum，对照固定环境 vs 自适应环境下的错误率和学习速度。
  预计 3-10 天可做出最小闭环。

