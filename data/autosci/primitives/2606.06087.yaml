primitive_id: weight-space-agent-skill-compiler
source_paper: "2606.06087"
title: "LatentSkill: Compiling Textual Agent Skills into LoRA Weight Modules"
relevance_level: direct_pattern_strong
audience: ai_only
core_pattern: >
  把高复用 agent textual skill 从每步 prompt 注入迁移到可插拔 weight-space module：
  skill compiler G_phi 读取技能文档 s，一次前向生成 LoRA adapter Delta_s；执行时 frozen backbone
  挂载 theta plus alpha Delta_s，只接收任务历史 h_t，不再携带技能原文。训练分两段：文档级
  reconstruction/completion 预训练让 compiler 学会把 procedure text 压进权重；trajectory-supervised SFT
  让同一个 skill adapter 在完整 teacher trajectory 中稳定影响多步行为。推理侧支持 adapter cache、
  alpha scaling 与 component-level skill composition。
problem_class: reusable-agent-procedures-are-too-expensive-and-exposed-when-repeatedly-injected-as-prompt-text
components:
  - skill_document_corpus
  - hypernetwork_skill_compiler
  - lora_adapter_cache
  - trajectory_supervised_alignment
  - alpha_scaling_controller
  - component_level_skill_composer
autosci_modules:
  - typed_memory
  - self_skill_distiller
  - self_evolve_controller
  - guard
  - evaluator
inputs:
  - textual_skill_document
  - teacher_agent_trajectory
  - task_history_without_skill_text
  - optional_component_decomposition
outputs:
  - latent_skill_lora_adapter
  - adapter_cache_entry
  - alpha_scaled_agent_policy
  - composed_skill_adapter
implementation_idea: >
  Mini 版不要先训 8xH100 hypernetwork。先做 skill lifecycle manager：记录文本 skill、版本、适用域、
  调用频率、token cost、评测结果；再对高复用 skill 用现成 PEFT LoRA 或 mock adapter 做 compiled artifact，
  跑 no-skill / in-context-skill / compiled-skill 对照。第二阶段实现 alpha sweep 与 component-aware composer，
  验证“技能强度倒 U 曲线”和“共享组件不能重复放大”。
small_experiment: >
  选 3 个本站固定工作流技能（论文深读、忠实度冷审、源码实读），构造 20 个回放任务。对照 A=无技能，
  B=每轮 in-context skill，C=缓存 compiled skill/mock adapter。指标：成功率、人工纠错数、prefill token、
  latency、失败类型。再对 C 扫 alpha 或等价强度参数，确认是否出现任务级最优强度而非单调提升。1-14 天。
core_concepts:
  - name: "SOP（标准作业流程）"
    role: primary
    evidence: "textual skills — reusable procedures that encode task strategies, tool-use patterns, and recovery heuristics"
  - name: "可学习的记忆操作"
    role: primary
    evidence: "stores skill knowledge in weight space rather than context space"
  - name: "stability-plasticity（稳定-可塑权衡）"
    role: supporting
    evidence: "skills can be loaded, unloaded, replaced, or scaled without retraining the backbone"
  - name: "结构化产物代替对话"
    role: supporting
    evidence: "The skill text is consumed by a skill compiler, while inference uses the generated adapter"
  - name: "冲突消解"
    role: mentioned
    evidence: "skill composition in LoRA space requires semantic alignment between text decomposition and weight addition"
discovery_trace:
  hypothesis: "数据不足"
  failed_attempts: "原文没有逐步叙述 LatentSkill 解法如何从失败尝试中被发现；composition case study 解释了直接合并和文本合并为什么失败，但不是整体方法发现过程。"
  source_span: "paper.mdx#技术细节(选读)"
design_principles:
  - id: compile-stable-skills-keep-volatile-context
    principle: "高频稳定技能可以编译成可缓存参数模块；低频、易变、需审计的指令仍留在上下文或显式文档。"
    transfers_to: "AI-Brief 深读/冷审 harness 的长期技能沉淀；agent 产品的 skill registry。"
  - id: modular-parametric-memory-over-permanent-fusion
    principle: "参数化技能应优先做可加载/卸载/缩放/回滚的 adapter，而不是永久融合进 backbone。"
    transfers_to: "自进化 agent 的 memory/skill 生命周期管理。"
  - id: strength-control-is-a-first-class-interface
    principle: "技能影响力需要连续强度旋钮；LatentSkill 的 alpha sweep 显示过强会破坏 backbone。"
    transfers_to: "Online guard、skill router、adapter serving 的任务级控制策略。"
  - id: component-alignment-before-skill-composition
    principle: "组合技能前先对齐语义组件，共享组件只保留一次，task-specific 组件按需叠加。"
    transfers_to: "多技能 agent、工具 SOP 合并、prompt/harness 规则组合。"
  - id: token-savings-are-not-total-cost-savings
    principle: "prefill token 降低不等于系统总成本降低；训练 compiler、adapter cache、显存、热切换与安全门都要计入。"
    transfers_to: "生产 agent 成本模型与上线评审。"
risks:
  - code_not_released
  - limited_benchmarks
  - fixed_backbone_and_lora_config
  - composition_demo_narrow
  - security_not_complete
  - training_cost_high
status: extracted
