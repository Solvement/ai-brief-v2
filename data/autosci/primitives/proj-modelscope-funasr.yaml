primitive_id: "proj-modelscope-funasr"
source_project: "modelscope/FunASR"
source_url: "https://github.com/modelscope/FunASR"
title: "modelscope/FunASR reusable architecture pattern"
relevance_level: "project_pattern"
audience: "ai_only"
core_pattern: >

  AutoModel 组件组装器: 复制“主模型 + vad_model + punc_model + spk_model + kwargs”的组合方式，让应用代码只拿到一个
  `generate()`。 模型 alias 层: 像 `examples/openai_api/server.py` 一样把
  `sensevoice`、`paraformer`、`paraformer-en`、`fun-asr-nano` 映射到真实模型配置。 OpenAI 兼容转写端点: 保留
  `/v1/audio/transcriptions`、`/v1/models`、`/health`，让 OpenAI SDK、Dify、n8n、LangChain 走同一接入路径。 MCP
  本地工具包装: 把语音文件路径包装成 MCP `transcribe_audio`，返回文本和 segments，适合作为桌面 Agent 的本地能力。 迁移评测脚本: 复用
  `examples/migration/benchmark_funasr.py`
  的输入目录扫描、音频时长、elapsed_seconds、realtime_factor、results.jsonl、summary.md。 部署选型表: 把 Colab、Python
  API、OpenAI API、Docker Compose、Kubernetes、Runtime WebSocket、vLLM、MCP、Triton 分成不同路径。
