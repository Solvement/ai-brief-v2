name: Daily Content Refresh

on:
  schedule:
    # Run daily at about 16:00 UTC after morning source updates have usually landed.
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      column:
        description: "Which column to refresh"
        type: choice
        options: [all, news, papers, projects, models]
        default: all

permissions:
  contents: write

# Required repo secrets:
# - DEEPSEEK_API_KEY
# - HF_TOKEN
# - GITHUB_TOKEN

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 新论文管线用官方 hf CLI(hf papers ls)抓 HF 日/周/月榜 → runner 需安装
      - name: Install Hugging Face CLI
        run: |
          pip install -U "huggingface_hub[cli]"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          hf version

      - name: Run daily refresh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass the dispatch input through env instead of interpolating it into
          # the shell command (avoids script injection). parseArgs validates it.
          COLUMN: ${{ github.event.inputs.column || 'all' }}
        run: npm run daily -- --only "$COLUMN"

      # Quality gate parity with the local boot path (scripts/boot-daily.ps1):
      # `npm run verify` = lint (ESLint + content lint) + test (node:test + validate)
      # + next build. A non-zero exit here aborts the job BEFORE the commit/push step,
      # so broken or stale generated content never auto-deploys to production.
      # No `continue-on-error`: a failed gate must stop the job (RED LINE: no gate = no publish).
      - name: Quality gate (no gate = no publish)
        run: npm run verify

      - name: Commit data changes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain -- public/data data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data data
            DATE="$(date -u +'%Y-%m-%d')"
            git commit -m "chore(daily): refresh content ${DATE}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            echo "No daily data changes under public/data or data."
          fi
